function WaveformPlayer({small=false}){
  const bars=small?20:40;
  const heights=useMemo(()=>Array.from({length:bars}).map(()=>8+Math.random()*(small?22:42)),[bars,small]);
  const delays=useMemo(()=>Array.from({length:bars}).map(()=>[0.5+Math.random()*0.8,Math.random()*0.5]),[bars]);
  return <div style={{display:'flex',alignItems:'end',gap:small?2:3,height:small?30:50,padding:'8px 0'}}>
    {heights.map((h,i)=><div key={i} style={{width:small?3:4,borderRadius:2,background:`linear-gradient(to top, #6366f1, #818cf8)`,animation:`waveAnim ${delays[i][0]}s ease-in-out ${delays[i][1]}s infinite`,height:h}}/>)}
    <div style={{marginLeft:8,fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>{small?'0:30':'3:24'} / {small?'0:30':'3:24'}</div>

}

        {columns.map((c,ci)=><td key={ci} style={{padding:'12px',borderBottom:'1px solid var(--border)',color:'var(--text)'}}>{c.render?c.render(row[c.key],row):row[c.key]}</td>)}
      </tr>)}</tbody>
    </table>
  </div>;
}

function parseStyle(str){
  if(typeof str!=='string')return str;
  const obj={};
  str.split(';').forEach(p=>{
    const [k,v]=p.split(':').map(s=>s&&s.trim());
    if(k&&v){
      const key=k.replace(/-([a-z])/g,(_,c)=>c.toUpperCase());
      obj[key]=v;
    }
  });
  return obj;
}

function Toast({message,type='success'}){
  if(!message)return null;
  const colors={success:'var(--green)',error:'var(--red)',info:'var(--accent2)'};
  return <div className="fade-in" style={{position:'fixed',top:20,right:20,zIndex:9999,padding:'12px 24px',borderRadius:10,background:'#fff',border:`1px solid ${colors[type]}`,color:colors[type],fontSize:14,fontWeight:500,boxShadow:'0 8px 32px rgba(0,0,0,.4)'}}>
    {type==='success'?'✅':type==='error'?'❌':'ℹ️'} {message}
  </div>;
}

  </div>;
}

function TeacherReview(){
  const {reviewSong,nav,showToast,songs,setSongs,setAssignmentSubs,setReviewSong}=useApp();
  const [scores,setScores]=useState({technique:75,creativity:80,commercial:70});
  const [comment,setComment]=useState('');
  const [quickTags,setQuickTags]=useState([]);
  const [recommendation,setRecommendation]=useState('strongly_recommend');
  const [markers]=useState([]);
  const song=reviewSong||songs.find(s=>s.status==='pending_review');
  const student=MOCK.students.find(s=>s.id===song?.userId);
  const total=(scores.technique*0.3+scores.creativity*0.4+scores.commercial*0.3).toFixed(1);
  const tags=['编曲结构完整','旋律记忆点强','人声融合度高','歌词有深度','建议优化混音','建议调整BPM','Prompt技巧有进步','建议丰富流派元素'];

  if(!song)return <PageLayout title="评审"><Empty text="请从待评审列表选择歌曲"/><Btn onClick={()=>nav('teacher_queue')}>返回列表</Btn></PageLayout>;

  return <PageLayout title="歌曲评审" subtitle={`${song.title} · ${student?.name}`} actions={<Btn variant="ghost" onClick={()=>nav('teacher_queue')}>← 返回列表</Btn>}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
      {/* Left: Song Info + Player */}
      <div>
        <div style={parseStyle(css.card)}>
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16}}>
            <div style={{fontSize:48,width:72,height:72,background:'#f0f4fb',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>{song.cover}</div>
            <div>
              <div style={{fontSize:18,fontWeight:600}}>{song.title}</div>
              <div style={{fontSize:13,color:'var(--text3)'}}>by {student?.name} · {song.genre} · {song.bpm} BPM</div>
            </div>
          </div>
          <div style={{padding:16,background:'#f0f4fb',borderRadius:10,marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>showToast('▶ 播放中（原型演示）')} style={{background:'var(--accent)',border:'none',borderRadius:'50%',width:36,height:36,color:'#fff',fontSize:16,cursor:'pointer'}}>▶</button>
                <button onClick={()=>showToast('A-B循环标记已设置')} style={{background:'#f8faff',border:'none',borderRadius:6,padding:'0 12px',color:'var(--text2)',fontSize:12,cursor:'pointer'}}>A-B循环</button>
              </div>
              <select style={{background:'#f8faff',border:'none',borderRadius:6,padding:'4px 8px',color:'var(--text2)',fontSize:12}}>
                <option>1.0x</option><option>0.5x</option><option>0.75x</option><option>1.25x</option><option>1.5x</option>
              </select>
            </div>
            <WaveformPlayer/>
          </div>
          <div style={{fontSize:13}}>
            <div style={{marginBottom:10}}><span style={{color:'var(--text3)'}}>AI工具：</span>{song.aiTool}</div>
            <div style={{marginBottom:10}}><span style={{color:'var(--text3)'}}>Prompt：</span><div style={{padding:8,background:'#f0f4fb',borderRadius:6,marginTop:4,fontSize:12,color:'var(--text2)',lineHeight:1.6}}>{song.prompt}</div></div>
            <div><span style={{color:'var(--text3)'}}>歌词：</span><div style={{padding:8,background:'#f0f4fb',borderRadius:6,marginTop:4,fontSize:12,color:'var(--text2)',lineHeight:1.6,maxHeight:120,overflow:'auto'}}>这里是歌词内容预览区域...\n每一句歌词都会在这里显示\n方便老师边听边看歌词</div></div>
          </div>
          {/* AI Analysis Panel */}
          <details style={{marginTop:16}}>
            <summary style={{cursor:'pointer',fontSize:13,color:'var(--accent2)',padding:'8px 0'}}>🤖 AI预分析报告（仅供参考）</summary>
            <div style={{padding:12,background:'#f0f4fb',borderRadius:8,marginTop:8,fontSize:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[['检测BPM',`${song.bpm} ✅ 一致`],['调性','C Major'],['响度','-14.2 LUFS'],['频谱','中频突出'],['段落','前奏-主歌-副歌-间奏-副歌-尾奏'],['制作度','中等偏上']].map(([k,v])=>
                <div key={k} style={{padding:6,background:'#fff',borderRadius:4}}><span style={{color:'var(--text3)'}}>{k}：</span>{v}</div>
              )}
            </div>
          </details>
        </div>
      </div>

      {/* Right: Scoring Form */}
      <div>
        <div style={parseStyle(css.card)}>
          <h3 style={{fontSize:16,fontWeight:600,marginBottom:20}}>📝 评分表单</h3>
          {/* Score Sliders */}
          {[{key:'technique',label:'技术熟练度',weight:'30%'},{key:'creativity',label:'创意立意',weight:'40%'},{key:'commercial',label:'商业传播潜力',weight:'30%'}].map(dim=>
            <div key={dim.key} style={{marginBottom:20}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}>
                <span>{dim.label} <span style={{color:'var(--text3)'}}>({dim.weight})</span></span>
                <span style={{fontWeight:700,color:scores[dim.key]>=80?'var(--green2)':scores[dim.key]>=60?'var(--orange)':'var(--red)',fontSize:18}}>{scores[dim.key]}</span>
              </div>
              <input type="range" min="0" max="100" value={scores[dim.key]} onChange={e=>setScores(p=>({...p,[dim.key]:+e.target.value}))} style={{width:'100%',accentColor:'var(--accent)'}}/>
            </div>
          )}
          <div style={{textAlign:'center',padding:16,background:'linear-gradient(135deg,rgba(108,92,231,.15),rgba(0,206,201,.1))',borderRadius:12,marginBottom:20}}>
            <div style={{fontSize:12,color:'var(--text3)'}}>加权总分</div>
            <div style={{fontSize:42,fontWeight:700,color:total>=80?'var(--green2)':total>=60?'var(--orange)':'var(--red)'}}>{total}</div>
          </div>

          {/* Quick Tags */}
          <div style={{marginBottom:16}}>
            <label style={parseStyle(css.label)}>快捷评语（点击插入）</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {tags.map(t=><button key={t} onClick={()=>{setQuickTags(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);if(!quickTags.includes(t))setComment(c=>c+(c?'；':'')+t);}} style={{padding:'4px 12px',borderRadius:16,border:`1px solid ${quickTags.includes(t)?'var(--accent)':'var(--border)'}`,background:quickTags.includes(t)?'var(--accent-glow)':'transparent',color:quickTags.includes(t)?'var(--accent2)':'var(--text3)',fontSize:12,cursor:'pointer',transition:'all .2s'}}>{t}</button>)}
            </div>
          </div>

          {/* Comment */}
          <div style={{marginBottom:16}}>
            <label style={parseStyle(css.label)}>专业评语 <span style={{color:'var(--text3)'}}>（≥20字）</span></label>
            <textarea style={{...parseStyle(css.input),height:100,resize:'vertical'}} value={comment} onChange={e=>setComment(e.target.value)} placeholder="请输入详细的专业指导评语..."/>
          </div>

          {/* Recommendation */}
          <div style={{marginBottom:20}}>
            <label style={parseStyle(css.label)}>发行建议</label>
            {[{v:'strongly_recommend',l:'🌟 强烈推荐发行',c:'var(--green2)'},{v:'recommend_after_revision',l:'📝 建议修改后发行',c:'var(--orange)'},{v:'not_recommend',l:'⏸ 暂不推荐',c:'var(--text3)'}].map(o=>
              <label key={o.v} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',marginBottom:4,borderRadius:8,cursor:'pointer',background:recommendation===o.v?'var(--bg2)':'transparent',border:`1px solid ${recommendation===o.v?'var(--border2)':'transparent'}`,fontSize:13,color:o.c,transition:'all .15s'}}>
                <input type="radio" name="rec" value={o.v} checked={recommendation===o.v} onChange={()=>setRecommendation(o.v)}/>{o.l}
              </label>
            )}
          </div>

          <Btn variant="success" style="width:100%;justify-content:center;padding:14px;font-size:15px;" onClick={()=>{
            if(comment.length<20){showToast('❌ 评语至少20字');return;}
            const score=+total;
            // 根据推荐等级和分数决定新状态
            const newStatus=
              recommendation==='strongly_recommend'&&score>=80?'ready_to_publish':
              recommendation==='recommend_after_revision'?'needs_revision':'reviewed';
            // 更新 songs state
            setSongs(prev=>prev.map(s=>s.id===song.id?{
              ...s,status:newStatus,score,
              reviewComment:recommendation==='recommend_after_revision'?comment:s.reviewComment
            }:s));
            // 同步更新 assignmentSubs（若是作业来源）
            if(song.source==='assignment'){
              setAssignmentSubs(prev=>prev.map(sub=>
                sub.assignmentId===song.assignmentId&&sub.userId===song.userId
                  ?{...sub,status:newStatus==='needs_revision'?'needs_revision':'reviewed',score}
                  :sub
              ));
            }
            setReviewSong(null);
            const statusLabel={ready_to_publish:'已流转至待发行 🚀',needs_revision:'已发回修改 📝',reviewed:'已入库待发行 📋'}[newStatus];
            showToast(`✅ 评审完成！总分 ${score} — ${statusLabel}`);
            nav('teacher_queue');
          }}>✅ 提交评审</Btn>
        </div>
      </div>
    </div>
  </PageLayout>;
}

function App(){
  const [role,setRole]=useState(null);
  const [page,setPage]=useState('teacher_dashboard');
  const [toast,setToast]=useState('');
  const [reviewSong,setReviewSong]=useState(null);
  const [songs,setSongs]=useState(()=>MOCK.songs.map(s=>({...s})));
  const [assignmentSubs,setAssignmentSubs]=useState(()=>MOCK.assignmentSubmissions.map(s=>({...s})));
  const showToast=useCallback((msg)=>{setToast(msg);setTimeout(()=>setToast(''),3000);},[]);
  const nav=useCallback((p)=>{setPage(p);window.scrollTo(0,0);},[]);
  useEffect(()=>{ if(role==='teacher')setPage('teacher_dashboard'); },[role]);
  const ctx=useMemo(()=>({nav,showToast,reviewSong,setReviewSong,songs,setSongs,assignmentSubs,setAssignmentSubs}),[nav,showToast,reviewSong,songs,assignmentSubs]);
  if(!role)return <LoginPage onLogin={r=>setRole(r)}/>;
  const menus=[
    {key:'d1',label:'工作',divider:true},
    {key:'teacher_dashboard',label:'工作台',icon:'📊'},
    {key:'teacher_queue',label:'待评审列表',icon:'📋',badge:songs.filter(s=>s.status==='pending_review').length},
    {key:'teacher_review',label:'评审页面',icon:'🎧'},
    {key:'d2',label:'统计',divider:true},
    {key:'teacher_stats',label:'我的绩效',icon:'📈'},
    {key:'d3',label:'个人',divider:true},
    {key:'teacher_profile',label:'个人中心',icon:'👤'},
  ];
  const pages={teacher_dashboard:<TeacherDashboard/>,teacher_queue:<TeacherQueue/>,teacher_review:<TeacherReview/>,teacher_stats:<TeacherStats/>,teacher_profile:<TeacherProfile/>};
  return <AppContext.Provider value={ctx}>
    <Sidebar items={menus} active={page} onNav={nav} role="teacher" onLogout={()=>{setRole(null);setPage('teacher_dashboard');}}/>
    {pages[page]||<PageLayout title="页面不存在"><Empty text="请从侧边栏选择功能"/></PageLayout>}
    <Toast message={toast}/>
  </AppContext.Provider>;
}
ReactDOM.render(<App/>,document.getElementById('root'));

</script>
