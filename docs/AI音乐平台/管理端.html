function WaveformPlayer({small=false}){
  const bars=small?20:40;
  const heights=useMemo(()=>Array.from({length:bars}).map(()=>8+Math.random()*(small?22:42)),[bars,small]);
  const delays=useMemo(()=>Array.from({length:bars}).map(()=>[0.5+Math.random()*0.8,Math.random()*0.5]),[bars]);
  return <div style={{display:'flex',alignItems:'end',gap:small?2:3,height:small?30:50,padding:'8px 0'}}>
    {heights.map((h,i)=><div key={i} style={{width:small?3:4,borderRadius:2,background:`linear-gradient(to top, #6366f1, #818cf8)`,animation:`waveAnim ${delays[i][0]}s ease-in-out ${delays[i][1]}s infinite`,height:h}}/>)}
    <div style={{marginLeft:8,fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>{small?'0:30':'3:24'} / {small?'0:30':'3:24'}</div>

}

        {columns.map((c,ci)=><td key={ci} style={{padding:'12px',borderBottom:'1px solid var(--border)',color:'var(--text)'}}>{c.render?c.render(row[c.key],row):row[c.key]}</td>)}
      </tr>)}</tbody>
    </table>
  </div>;
}

function parseStyle(str){
  if(typeof str!=='string')return str;
  const obj={};
  str.split(';').forEach(p=>{
    const [k,v]=p.split(':').map(s=>s&&s.trim());
    if(k&&v){
      const key=k.replace(/-([a-z])/g,(_,c)=>c.toUpperCase());
      obj[key]=v;
    }
  });
  return obj;
}

function Toast({message,type='success'}){
  if(!message)return null;
  const colors={success:'var(--green)',error:'var(--red)',info:'var(--accent2)'};
  return <div className="fade-in" style={{position:'fixed',top:20,right:20,zIndex:9999,padding:'12px 24px',borderRadius:10,background:'#fff',border:`1px solid ${colors[type]}`,color:colors[type],fontSize:14,fontWeight:500,boxShadow:'0 8px 32px rgba(0,0,0,.4)'}}>
    {type==='success'?'✅':type==='error'?'❌':'ℹ️'} {message}
  </div>;
}

  </div>;
}

}

function AdminSongs(){

        {key:'title',title:'歌曲名',render:v=><span style={{fontWeight:600}}>{v}</span>},
        {key:'userId',title:'创作者',render:v=>MOCK.students.find(s=>s.id===v)?.name},
        {key:'source',title:'来源',render:v=>v==='assignment'?<span style={{fontSize:11,color:'var(--accent2)'}}>📝 作业</span>:<span style={{fontSize:11,color:'var(--green)'}}>⬆️ 自由</span>},
        {key:'score',title:'评分',render:v=>v?<span style={{fontWeight:600,color:v>=80?'var(--green2)':'var(--orange)'}}>{v}</span>:'-'},
        {key:'copyrightCode',title:'作品编号',render:v=><span style={{fontSize:11,fontFamily:'monospace'}}>{v}</span>},
        {key:'isrc',title:'ISRC',render:v=>v?<span style={{fontSize:11,fontFamily:'monospace',color:'var(--green2)'}}>{v}</span>:<span style={{fontSize:11,color:'var(--text3)'}}>待申报</span>},
        {key:'status',title:'状态',render:v=><Badge status={v}/>},

              if(!student?.agencyContract){showToast('❌ 发行失败：该创作者未签署代理发行协议');return;}
              if(student?.realNameStatus!=='verified'){showToast('❌ 发行失败：该创作者未完成实名认证');return;}
              if(!r.isrc){showToast('⚠️ 请先绑定ISRC码后再确认发行');return;}
              setSongs(prev=>prev.map(s=>s.id===r.id?{...s,status:'published'}:s));
              showToast(`✅ 已确认发行《${r.title}》`);
            }}>确认发行</Btn>
            <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>showToast(`已绑定ISRC`)}>绑ISRC</Btn>
            <Btn variant="danger" style="font-size:11px;padding:4px 10px;" onClick={()=>{setSongs(prev=>prev.map(s=>s.id===r.id?{...s,status:'needs_revision'}:s));showToast(`已退回《${r.title}》`)}}>退回</Btn>
          </div>;}
          if(r.status==='pending_review') return <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>showToast('请在评审端处理该歌曲')}>待评审</Btn>;
          if(r.status==='reviewed') return <div style={{display:'flex',gap:6}}>
            <Btn variant="success" style="font-size:11px;padding:4px 10px;" onClick={()=>{
              const student=MOCK.students.find(st=>st.id===r.userId);
              if(!student?.agencyContract){showToast('❌ 发行失败：该创作者未签署代理发行协议');return;}
              if(student?.realNameStatus!=='verified'){showToast('❌ 发行失败：该创作者未完成实名认证');return;}
              if(!r.isrc){showToast('⚠️ 请先绑定ISRC码后再确认发行');return;}
              setSongs(prev=>prev.map(s=>s.id===r.id?{...s,status:'published'}:s));
              showToast(`✅ 已手动发行《${r.title}》（管理员判断）`);
            }}>手动发行</Btn>
            <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>showToast('已绑定ISRC')}>绑ISRC</Btn>
          </div>;
          if(r.status==='published') return <div style={{display:'flex',gap:4}}>
            <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>showToast(`${r.title}：${MOCK.distributions.filter(d=>d.songId===r.id&&d.status==='live').length}个平台已上架`)}>查看渠道</Btn>
            <Btn variant="danger" style="font-size:11px;padding:4px 10px;" onClick={()=>{setSongs(prev=>prev.map(s=>s.id===r.id?{...s,status:'archived'}:s));showToast(`《${r.title}》已归档`)}}>归档</Btn>
          </div>;
          if(r.status==='archived') return <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>{setSongs(prev=>prev.map(s=>s.id===r.id?{...s,status:'reviewed'}:s));showToast(`《${r.title}》已恢复至已入库`)}}>恢复</Btn>;
          return null;
        }},
      ]} data={filtered}/>
    </div>
  </PageLayout>;
}

function AdminRevenue(){
  const [tab,setTab]=useState('qishui');
  const {showToast}=useApp();
  const [matchDetail,setMatchDetail]=useState(null);
  const [importModal,setImportModal]=useState(false);
  const [statsTab,setStatsTab]=useState('user');
  const [mappingFilter,setMappingFilter]=useState('all');
  const [linkModal,setLinkModal]=useState(null); // 人工绑定弹窗

  // 统计
  const allDetails=MOCK.qishuiDetails.filter(d=>d.matchedUserId&&d.matchStatus==='id_confirmed');
  const byUser={};const bySong={};const byPeriod={};
  allDetails.forEach(d=>{
    const uk=d.matchedUserName||'未知';if(!byUser[uk])byUser[uk]={name:uk,douyin:0,qishui:0,total:0,songs:new Set()};byUser[uk].douyin+=d.douyinRevenue;byUser[uk].qishui+=d.qishuiRevenue;byUser[uk].total+=d.totalRevenue;byUser[uk].songs.add(d.songName);
    const sk=d.songName;if(!bySong[sk])bySong[sk]={name:sk,user:d.matchedUserName,douyin:0,qishui:0,total:0,periods:new Set()};bySong[sk].douyin+=d.douyinRevenue;bySong[sk].qishui+=d.qishuiRevenue;bySong[sk].total+=d.totalRevenue;bySong[sk].periods.add(d.period);
    const pk=d.period;if(!byPeriod[pk])byPeriod[pk]={period:pk,douyin:0,qishui:0,total:0,songs:0,users:new Set()};byPeriod[pk].douyin+=d.douyinRevenue;byPeriod[pk].qishui+=d.qishuiRevenue;byPeriod[pk].total+=d.totalRevenue;byPeriod[pk].songs++;byPeriod[pk].users.add(d.matchedUserName);
  });
  const userStats=Object.values(byUser).map(u=>({...u,songCount:u.songs.size})).sort((a,b)=>b.total-a.total);
  const songStats=Object.values(bySong).map(s=>({...s,periodCount:s.periods.size})).sort((a,b)=>b.total-a.total);
  const periodStats=Object.values(byPeriod).map(p=>({...p,userCount:p.users.size})).sort((a,b)=>a.period>b.period?-1:1);
  const grandTotal=allDetails.reduce((s,d)=>s+d.totalRevenue,0);
  const grandDouyin=allDetails.reduce((s,d)=>s+d.douyinRevenue,0);
  const grandQishui=allDetails.reduce((s,d)=>s+d.qishuiRevenue,0);
  const pendingCount=MOCK.qishuiDetails.filter(d=>d.matchStatus==='name_pending').length;
  const MATCH_STATUS={id_confirmed:{l:'🔗 ID确认',c:'var(--green2)',bg:'rgba(85,239,196,.12)',desc:'映射表命中'},name_pending:{l:'⚠️ 歌名待确认',c:'var(--orange)',bg:'rgba(253,203,110,.12)',desc:'歌名匹配，需人工确认'},unmatched:{l:'❌ 未匹配',c:'var(--text3)',bg:'rgba(107,114,128,.12)',desc:'未找到对应创作者'}};
  const MAP_STATUS={confirmed:{l:'✅ 已确认',c:'var(--green2)'},pending:{l:'⚠️ 待确认',c:'var(--orange)'},unlinked:{l:'❌ 未绑定',c:'var(--text3)'}};

  return <PageLayout title="收益管理" subtitle="汽水音乐导入 · 歌曲ID映射 · 多维统计">
    <Tab tabs={[
      {key:'qishui',label:'🎵 汽水导入'},
      {key:'mapping',label:`🔗 匹配关系${pendingCount>0?' ('+pendingCount+')':''}`},
      {key:'stats',label:'📊 多维统计'},
      {key:'settle',label:'💰 结算管理'},
      {key:'imports',label:'📥 其他平台'},
      {key:'platform_settle',label:'🏦 平台分发结算'},
    ]} active={tab} onChange={setTab}/>

    {/* ═══ 汽水音乐导入 ═══ */}

      <div style={{...parseStyle(css.card),marginBottom:20}}>
        <h3 style={{fontSize:15,fontWeight:600,marginBottom:4}}>导入汽水音乐收益报表</h3>
        <p style={{fontSize:12,color:'var(--text3)',marginBottom:16}}>每月从汽水后台导出CSV → 系统按歌曲ID查映射表精确匹配 → 新歌曲按歌名匹配歌曲库（含作业提交+自由上传）待人工确认 → 确认后自动记入映射表</p>
        <div style={{display:'flex',gap:12}}>
          <div style={{flex:1,border:'2px dashed var(--border)',borderRadius:10,padding:'16px 20px',cursor:'pointer',transition:'all .2s',display:'flex',alignItems:'center',gap:12}} onClick={()=>setImportModal(true)} onMouseOver={e=>e.currentTarget.style.borderColor='var(--accent)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
            <span style={{fontSize:28}}>📎</span>
            <div><div style={{fontSize:14,fontWeight:500}}>点击上传汽水音乐 CSV</div><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>歌曲名称 · 歌曲ID · 抖音收入 · 汽水收入 · 总收入</div></div>
          </div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:14,marginBottom:20}}>
        <StatCard icon="📥" label="导入批次" value={MOCK.qishuiImports.length} color="var(--accent2)"/>
        <StatCard icon="🔗" label="映射表记录" value={MOCK.songIdMappings.length} color="var(--green)"/>

          {key:'totalRevenue',title:'总收益',render:v=>`¥${v.toFixed(2)}`},
          {key:'id',title:'',render:(v,r)=><Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>setMatchDetail(r)}>详情</Btn>},
        ]} data={MOCK.qishuiImports}/>

      <div style={{...parseStyle(css.card),padding:16,marginBottom:20,background:'linear-gradient(135deg,rgba(108,92,231,.06),rgba(0,206,201,.04))'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:32}}>🔗</span>
          <div>
            <h3 style={{fontSize:15,fontWeight:600,marginBottom:4}}>歌曲ID映射关系表</h3>

          </div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
        <StatCard icon="✅" label="已确认映射" value={MOCK.songIdMappings.filter(m=>m.status==='confirmed').length} sub="导入时自动命中" color="var(--green2)"/>
        <StatCard icon="⚠️" label="待确认" value={MOCK.songIdMappings.filter(m=>m.status==='pending').length} sub="需人工审核" color="var(--orange)"/>

      </div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {[{k:'all',l:'全部'},{k:'confirmed',l:'✅ 已确认'},{k:'pending',l:'⚠️ 待确认'},{k:'unlinked',l:'❓ 未绑定'}].map(f=>
          <button key={f.k} onClick={()=>setMappingFilter(f.k)} style={{padding:'6px 14px',borderRadius:20,border:'none',fontSize:12,cursor:'pointer',background:mappingFilter===f.k?'var(--accent)':'var(--bg4)',color:mappingFilter===f.k?'#fff':'var(--text2)'}}>{f.l} ({f.k==='all'?MOCK.songIdMappings.length:MOCK.songIdMappings.filter(m=>m.status===f.k).length})</button>
        )}
        <div style={{flex:1}}/>
        <Btn variant="ghost" style="font-size:12px;" onClick={()=>showToast('已导出映射关系表')}>📥 导出</Btn>
      </div>
      <div style={parseStyle(css.card)}>
        <Table columns={[
          {key:'qishuiSongId',title:'歌曲ID',render:v=><span style={{fontSize:10,fontFamily:'monospace',color:'var(--text3)',userSelect:'all'}}>{v}</span>},
          {key:'songName',title:'歌曲名称',render:v=><span style={{fontWeight:500}}>{v}</span>},

  const allRows=[
    ...MOCK.courses,
    ...Array.from({length:14}).map((_,i)=>({id:100+i,title:'Suno AI音乐制作入门',type:'course_video',category:'AI工具教程',cover:'🎹',views:4746,status:'published'})),

    {id:201,title:'流行音乐混音入门',type:'article',category:'基础乐理',cover:'📖',views:2840,status:'draft'},
  ];
  const filtered=tab==='all'?allRows:allRows.filter(r=>r.type===tab);

// ─── 作品库批量下载 ────────────────────────────
function AdminBatchDownload(){
  const {showToast,songs}=useApp();
  const [selected,setSelected]=useState([]);
  const [filterStatus,setFilterStatus]=useState('ready_to_publish');
  const [filterGenre,setFilterGenre]=useState('all');
  const [filterAiTool,setFilterAiTool]=useState('all');
  const [filterScore,setFilterScore]=useState('all');
  const [keyword,setKeyword]=useState('');

  const allGenres=[...new Set(songs.map(s=>s.genre))];
  const allAiTools=[...new Set(songs.map(s=>s.aiTool))];

  let filtered=songs;
  if(filterStatus!=='all')filtered=filtered.filter(s=>s.status===filterStatus);
  if(filterGenre!=='all')filtered=filtered.filter(s=>s.genre===filterGenre);
  if(filterAiTool!=='all')filtered=filtered.filter(s=>s.aiTool===filterAiTool);
  if(filterScore==='high')filtered=filtered.filter(s=>(s.score||0)>=90);
  else if(filterScore==='mid')filtered=filtered.filter(s=>(s.score||0)>=80&&(s.score||0)<90);
  if(keyword)filtered=filtered.filter(s=>s.title.includes(keyword)||(s.lyricist||'').includes(keyword));

  const allIds=filtered.map(s=>s.id);
  const allChecked=allIds.length>0&&allIds.every(id=>selected.includes(id));
  const someChecked=selected.length>0&&!allChecked;
  const toggle=id=>setSelected(selected.includes(id)?selected.filter(x=>x!==id):[...selected,id]);
  const toggleAll=()=>setSelected(allChecked?selected.filter(id=>!allIds.includes(id)):[...new Set([...selected,...allIds])]);

  const batchDownload=()=>{
    if(selected.length===0){showToast('请先勾选要下载的歌曲','error');return;}
    showToast(`开始打包下载 ${selected.length} 首歌曲（音频 + 元数据 + 版权凭证）`);
    setTimeout(()=>setSelected([]),300);
  };
  const batchExportMeta=()=>{
    if(selected.length===0){showToast('请先勾选要导出的歌曲','error');return;}
    showToast(`已导出 ${selected.length} 首歌曲元数据表（Excel）`);
  };

  return <PageLayout title="作品库批量下载" subtitle="筛选待发行作品,批量打包下载音频与元数据">
    {/* 筛选区 */}
    <div style={parseStyle(css.card)}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:12}}>
        <div>
          <label style={parseStyle(css.label)}>作品状态</label>
          <select style={parseStyle(css.input)} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option value="ready_to_publish">🚀 待发行</option>
            <option value="published">✅ 已发行</option>
            <option value="reviewed">📝 已评审</option>
            <option value="all">全部</option>
          </select>
        </div>
        <div>
          <label style={parseStyle(css.label)}>风格</label>
          <select style={parseStyle(css.input)} value={filterGenre} onChange={e=>setFilterGenre(e.target.value)}>
            <option value="all">全部风格</option>
            {allGenres.map(g=><option key={g} value={g}>{g}</option>)}
          </select>
        </div>
        <div>
          <label style={parseStyle(css.label)}>AI 工具</label>
          <select style={parseStyle(css.input)} value={filterAiTool} onChange={e=>setFilterAiTool(e.target.value)}>
            <option value="all">全部工具</option>
            {allAiTools.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        <div>
          <label style={parseStyle(css.label)}>评分区间</label>
          <select style={parseStyle(css.input)} value={filterScore} onChange={e=>setFilterScore(e.target.value)}>
            <option value="all">全部分数</option>
            <option value="high">90 分以上(强推)</option>
            <option value="mid">80-89 分</option>
          </select>
        </div>
        <div>
          <label style={parseStyle(css.label)}>关键词</label>
          <input style={parseStyle(css.input)} placeholder="歌名 / 创作者" value={keyword} onChange={e=>setKeyword(e.target.value)}/>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderTop:'1px solid var(--border)'}}>
        <div style={{fontSize:13,color:'var(--text2)'}}>
          共 <span style={{color:'var(--accent2)',fontWeight:600}}>{filtered.length}</span> 首作品
          {selected.length>0&&<span> · 已选 <span style={{color:'var(--green2)',fontWeight:600}}>{selected.length}</span> 首
            {selected.length>filtered.filter(s=>selected.includes(s.id)).length&&
              <span style={{color:'var(--orange)',marginLeft:8,fontSize:12}}>
                (其中 {selected.length-filtered.filter(s=>selected.includes(s.id)).length} 首在当前筛选外)
              </span>
            }
          </span>}
        </div>
        <div style={{display:'flex',gap:8}}>
          {selected.length>0&&<Btn variant="ghost" onClick={()=>setSelected([])}>✕ 清空选择</Btn>}
          <Btn variant="ghost" onClick={batchExportMeta}>📊 导出元数据表</Btn>
          <Btn variant="success" onClick={batchDownload}>⬇️ 批量下载 {selected.length>0?`(${selected.length})`:''}</Btn>
        </div>
      </div>
    </div>

    {/* 列表 */}
    <div style={parseStyle(css.card)}>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr>
            <th style={{padding:'10px 12px',textAlign:'left',borderBottom:'1px solid var(--border)',width:36}}>
              <input type="checkbox" checked={allChecked} ref={el=>{if(el)el.indeterminate=someChecked}} onChange={toggleAll} style={{cursor:'pointer'}}/>
            </th>
            {['','歌曲名','创作者','风格','BPM','AI工具','评分','作品编号','ISRC','状态','文件'].map((h,i)=>
              <th key={i} style={{padding:'10px 12px',textAlign:'left',color:'var(--text2)',fontWeight:500,borderBottom:'1px solid var(--border)',fontSize:11,textTransform:'uppercase',letterSpacing:'.5px',whiteSpace:'nowrap'}}>{h}</th>
            )}
          </tr></thead>
          <tbody>{filtered.map(s=>{
            const student=MOCK.students.find(u=>u.id===s.userId);
            const checked=selected.includes(s.id);
            return <tr key={s.id} style={{background:checked?'rgba(162,155,254,.06)':'transparent',transition:'background .15s'}}>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)'}}>
                <input type="checkbox" checked={checked} onChange={()=>toggle(s.id)} style={{cursor:'pointer'}}/>
              </td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)',fontSize:20}}>{s.cover}</td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)',fontWeight:600}}>{s.title}</td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)'}}>{student?.name||'-'}</td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)',fontSize:12,color:'var(--text2)'}}>{s.genre}</td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)',fontSize:12,color:'var(--text2)'}}>{s.bpm}</td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)',fontSize:12,color:'var(--text2)'}}>{s.aiTool}</td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)',fontWeight:600,color:(s.score||0)>=80?'var(--green2)':'var(--orange)'}}>{s.score||'-'}</td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)',fontSize:11,fontFamily:'monospace',color:'var(--text2)'}}>{s.copyrightCode}</td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)',fontSize:11,fontFamily:'monospace'}}>{s.isrc?<span style={{color:'var(--green2)'}}>{s.isrc}</span>:<span style={{color:'var(--red)'}}>⚠️ 未绑定</span>}</td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)'}}><Badge status={s.status}/></td>
              <td style={{padding:'12px',borderBottom:'1px solid var(--border)'}}>
                <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>showToast(`下载《${s.title}》音频+元数据`)}>⬇️ 单独下载</Btn>
              </td>
            </tr>;
          })}</tbody>
        </table>
        {filtered.length===0&&<Empty text="没有符合条件的作品"/>}
      </div>
    </div>

    <div style={{...parseStyle(css.card),marginTop:16,background:'rgba(116,185,255,.06)',border:'1px solid rgba(116,185,255,.2)'}}>
      <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.7}}>
        <strong style={{color:'var(--accent2)'}}>💡 批量下载包含:</strong> 音频文件(WAV/FLAC/MP3)、歌词 TXT、元数据 JSON(含 ISRC/作品编号/BPM/风格/Prompt 等)、代理发行授权凭证 PDF。<br/>
        <strong style={{color:'var(--orange)'}}>⚠️ 发行前检查:</strong> 系统会自动校验「已签代理协议 + 已实名认证 + 已绑定 ISRC」,缺失项将在下载报告中标红。
      </div>
    </div>
  </PageLayout>;
}

// ─── 发行状态确认 ────────────────────────────
function AdminPublishConfirm(){
  const {showToast,songs,setSongs}=useApp();
  const [tab,setTab]=useState('confirm');
  const [selectedRow,setSelectedRow]=useState(null);

  const platforms=['QQ音乐','网易云音乐','Spotify','Apple Music','酷狗音乐'];
  const candidateSongs=songs.filter(s=>['ready_to_publish','published'].includes(s.status));

  // 今天的日期,用于计算已提交天数
  const today=new Date();
  const daysSince=dateStr=>{
    if(!dateStr)return null;
    return Math.floor((today-new Date(dateStr))/(1000*60*60*24));
  };
  const EXCEPTION_THRESHOLD=30;

  // 生成合并数据: 只纳入"已有发行轨迹"的记录 (有分发记录 或 已从平台返回数据)
  // 未安排的作品请至「作品库批量下载」或「歌曲库管理」提交
  const rows=[];
  candidateSongs.forEach(s=>{
    platforms.forEach(p=>{
      const d=MOCK.distributions.find(x=>x.songId===s.id&&x.platform===p);
      const hasData=MOCK.settlements.some(st=>st.songId===s.id&&p.includes(st.platform));
      if(!d&&!hasData)return; // 没有任何轨迹的不展示
      const days=daysSince(d?.submittedAt);
      const isException=d?.status==='submitted'&&!hasData&&days!==null&&days>EXCEPTION_THRESHOLD;
      let autoStatus;
      if(d?.status==='live')autoStatus='live';
      else if(hasData)autoStatus='data_confirmed';
      else if(isException)autoStatus='exception';
      else if(d?.status==='submitted')autoStatus='submitted';
      else if(d?.status==='pending')autoStatus='pending';
      rows.push({song:s,platform:p,distribution:d,hasData,autoStatus,days});
    });
  });

  const STATUS_INFO={
    live:{label:'✅ 已上架',color:'var(--green2)',bg:'rgba(85,239,196,.12)'},
    data_confirmed:{label:'📊 数据已回填',color:'var(--green)',bg:'rgba(0,206,201,.12)'},
    submitted:{label:'⏳ 已提交待上架',color:'var(--orange)',bg:'rgba(253,203,110,.12)'},
    exception:{label:'⚠️ 超期未上架',color:'var(--red)',bg:'rgba(255,118,117,.12)'},
    pending:{label:'📋 待提交',color:'var(--text3)',bg:'rgba(255,255,255,.05)'},
  };

  let filteredRows=rows;
  if(tab==='todo')filteredRows=rows.filter(r=>r.autoStatus==='pending');
  else if(tab==='confirm')filteredRows=rows.filter(r=>r.autoStatus==='submitted');
  else if(tab==='live')filteredRows=rows.filter(r=>['live','data_confirmed'].includes(r.autoStatus));
  else if(tab==='exception')filteredRows=rows.filter(r=>r.autoStatus==='exception');

  const tabs=[
    {key:'todo',label:'📤 待提交',count:rows.filter(r=>r.autoStatus==='pending').length},
    {key:'confirm',label:'🔔 待确认上架',count:rows.filter(r=>r.autoStatus==='submitted').length},
    {key:'live',label:'✅ 已发行',count:rows.filter(r=>['live','data_confirmed'].includes(r.autoStatus)).length},
    {key:'exception',label:`⚠️ 异常(>${EXCEPTION_THRESHOLD}天无数据)`,count:rows.filter(r=>r.autoStatus==='exception').length},
    {key:'all',label:'全部',count:rows.length},
  ];

  const autoSync=()=>{
    const dataConfirmedCount=rows.filter(r=>r.autoStatus==='data_confirmed').length;
    const exceptionCount=rows.filter(r=>r.autoStatus==='exception').length;
    showToast(`对账同步完成:${dataConfirmedCount} 首歌曲自动确认为「已发行」,${exceptionCount} 条记录进入异常队列`);
  };
  const confirmLive=r=>{setSongs(prev=>prev.map(s=>s.id===r.song.id?{...s,status:'published'}:s));showToast(`✅ 已确认《${r.song.title}》在 ${r.platform} 上架成功`);};
  const markException=r=>showToast(`已标记《${r.song.title}》@${r.platform} 为异常,待运营排查`);

  return <PageLayout title="发行状态确认" subtitle="月度对账自动回填 + 人工确认例外情况"
    actions={<Btn onClick={autoSync}>🔄 触发对账同步</Btn>}>

    {/* 策略说明 */}
    <div style={{...parseStyle(css.card),marginBottom:16,background:'rgba(162,155,254,.06)',border:'1px solid rgba(162,155,254,.2)'}}>
      <h3 style={{fontSize:14,fontWeight:600,marginBottom:10,color:'var(--accent2)'}}>📋 状态确认策略(自动 + 人工双轨)</h3>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
        <div style={{padding:12,background:'#f0f4fb',borderRadius:8}}>
          <div style={{color:'var(--green2)',fontWeight:600,marginBottom:4}}>① 自动确认(默认)</div>
          每月对账导入收益数据时,<strong style={{color:'var(--text)'}}>只要平台返回播放/收益数据</strong>,系统自动置为「已发行」,无需人工操作。
        </div>
        <div style={{padding:12,background:'#f0f4fb',borderRadius:8}}>
          <div style={{color:'var(--orange)',fontWeight:600,marginBottom:4}}>② 人工确认(提前)</div>
          平台已上架但<strong style={{color:'var(--text)'}}>尚未产生数据</strong>的歌曲,工作人员可在「待确认上架」页签手动确认,不必等下月对账。
        </div>
        <div style={{padding:12,background:'#f0f4fb',borderRadius:8}}>
          <div style={{color:'var(--red)',fontWeight:600,marginBottom:4}}>③ 异常处理</div>
          已提交 <strong style={{color:'var(--text)'}}>超过 30 天仍无数据</strong>的记录会进入「异常」页签,需人工排查(审核不通过/审核中)。
        </div>
      </div>
      <div style={{marginTop:10,fontSize:11,color:'var(--text3)',paddingTop:10,borderTop:'1px dashed var(--border)'}}>

        {key:'role',title:'属性',render:(v,r)=><span style={{fontSize:12,color:'var(--accent2)'}}>创作者{r.adminLevel==='group_admin'?' · 🔰组管理员':''}</span>},
        {key:'realNameStatus',title:'实名',render:v=>{const m={verified:{l:'已认证',c:'var(--green2)'},pending:{l:'待审核',c:'var(--orange)'},unverified:{l:'未认证',c:'var(--text3)'},rejected:{l:'已驳回',c:'var(--red)'}};const s=m[v];return <span style={{fontSize:12,color:s?.c}}>{s?.l}</span>}},
        {key:'songCount',title:'作品数'},
        {key:'id',title:'操作',render:(v,r)=><div style={{display:'flex',gap:4}}>
          <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>setRoleModal(r)}>权限</Btn>
          <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>showToast(`已重置 ${r.name} 的密码`)}>重置密码</Btn>
          <Btn variant="danger" style="font-size:11px;padding:4px 10px;" onClick={()=>{if(window.confirm(`确认禁用「${r.name}」？`))showToast(`已禁用创作者账号：${r.name}`)}}>禁用账号</Btn>
        </div>},
      ]} data={MOCK.students}/>
    </div>}

    {/* Create Account Modal */}
    <Modal title="创建评审账号" open={!!createModal} onClose={()=>setCreateModal(null)}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div><label style={parseStyle(css.label)}>姓名 *</label><input style={parseStyle(css.input)} placeholder="请输入姓名"/></div>
        <div><label style={parseStyle(css.label)}>手机号 *</label><input style={parseStyle(css.input)} placeholder="请输入手机号"/></div>
        <div><label style={parseStyle(css.label)}>邮箱 *</label><input style={parseStyle(css.input)} placeholder="请输入邮箱"/></div>
        <div><label style={parseStyle(css.label)}>加入用户组</label><select style={parseStyle(css.input)} defaultValue=""><option value="">选择用户组...</option>{MOCK.userGroups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}</select></div>
        <div><label style={parseStyle(css.label)}>初始密码</label><input style={parseStyle(css.input)} type="text" defaultValue="Abc12345" /><div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>账号创建后将通过邮件/短信发送初始密码，首次登录需修改</div></div>
        <Btn style="width:100%;justify-content:center;" onClick={()=>{setCreateModal(null);showToast('评审账号创建成功，已发送登录信息')}}>创建账号</Btn>
      </div>
    </Modal>

    {/* ★ Role/Permission Change Modal */}
    <Modal title={`变更权限 · ${roleModal?.name||''}`} open={!!roleModal} onClose={()=>setRoleModal(null)}>
      {roleModal&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div>
          <div style={{fontSize:13,color:'var(--text3)',marginBottom:6}}>当前角色</div>
          <span style={{fontSize:13,padding:'4px 12px',borderRadius:20,background:'#f0f4fb',fontWeight:500}}>{ROLE_LABELS[roleModal.role]||'创作者'}{roleModal.adminLevel?' · '+(ADMIN_LABELS[roleModal.adminLevel]||''):''}</span>
        </div>
        <div>
          <label style={parseStyle(css.label)}>用户属性</label>
          <select style={parseStyle(css.input)} defaultValue={roleModal.role||'creator'}>
            <option value="creator">🎵 创作者</option>
            <option value="reviewer">🎧 评审</option>
            <option value="admin">⚙️ 管理员</option>
          </select>
        </div>
        <div>
          <label style={parseStyle(css.label)}>管理权限</label>
          <select style={parseStyle(css.input)} defaultValue={roleModal.adminLevel||''}>
            <option value="">无特殊管理权限</option>
            <option value="group_admin">🔰 组管理员 — 管理所属组的成员</option>
            <option value="system_admin">🛡️ 系统管理员 — 管理所有用户组、邀请码、权限</option>
          </select>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>管理员可设置组管理员 · 系统管理员可设置系统管理员</div>
        </div>
        <div>
          <label style={parseStyle(css.label)}>所属用户组</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {MOCK.userGroups.map(g=>{
              const isMember=(roleModal.groupIds||[]).includes(g.id);
              return <button key={g.id} onClick={()=>showToast(`已${isMember?'移出':'加入'}「${g.name}」`)} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${isMember?'var(--accent)':'var(--border)'}`,background:isMember?'var(--accent-glow)':'transparent',color:isMember?'var(--accent2)':'var(--text3)',fontSize:12,cursor:'pointer'}}>{g.name} {isMember?'✓':''}</button>;
            })}
          </div>
        </div>
        <div style={{padding:12,background:'rgba(255,107,107,.08)',borderRadius:8,fontSize:12,color:'var(--red)'}}>⚠️ 变更权限将立即生效，请确认操作。</div>
        <Btn style="width:100%;justify-content:center;" onClick={()=>{setRoleModal(null);showToast('✅ 权限变更成功')}}>确认变更</Btn>
      </div>}
    </Modal>
  </PageLayout>;
}

// ★ 创作者端 — 作业提交
// ═══════════════════════════════════════════

function AdminAssignments(){
  const {showToast,assignmentSubs,songs}=useApp();
  const [tab,setTab]=useState('list');
  const [detail,setDetail]=useState(null);
  const [createModal,setCreateModal]=useState(false);
  const [fieldConfigModal,setFieldConfigModal]=useState(null);
  const [selectedGroup,setSelectedGroup]=useState('');

  // 查看作业详情（提交列表）
  if(detail){
    const asn=MOCK.assignments.find(a=>a.id===detail);
    const grp=MOCK.userGroups.find(g=>g.id===asn?.groupId);
    // 合并 context 中的最新提交状态与 songs 中的评审结果
    const subs=assignmentSubs.filter(s=>s.assignmentId===detail).map(sub=>{
      const linkedSong=songs.find(s=>s.source==='assignment'&&s.assignmentId===detail&&s.userId===sub.userId&&s.title===sub.data?.songTitle);
      return linkedSong?{...sub,status:linkedSong.status==='needs_revision'?'needs_revision':linkedSong.status==='pending_review'?'pending_review':'reviewed',score:linkedSong.score??sub.score}:sub;
    });
    const SUB_STATUS={pending_review:{l:'待评审',c:'var(--orange)'},reviewed:{l:'已评审',c:'var(--green2)'},needs_revision:{l:'需修改',c:'var(--red)'}};
    return <PageLayout title={`${asn.title}`} subtitle={`${grp?.name} · ${subs.length}/${asn.totalMembers} 人已提交`} actions={<div style={{display:'flex',gap:8}}><Btn variant="ghost" onClick={()=>setFieldConfigModal(asn)}>⚙️ 表单配置</Btn><Btn variant="ghost" onClick={()=>setDetail(null)}>← 返回</Btn></div>}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:20}}>
        <StatCard icon="📋" label="总成员" value={asn.totalMembers} color="var(--accent2)"/>
        <StatCard icon="✅" label="已提交" value={subs.length} sub={`${Math.round(subs.length/asn.totalMembers*100)}%`} color="var(--green2)"/>
        <StatCard icon="⏳" label="待评审" value={subs.filter(s=>s.status==='pending_review').length} color="var(--orange)"/>
      </div>
      <div style={{...parseStyle(css.card),marginBottom:16}}>
        <h3 style={{fontSize:15,fontWeight:600,marginBottom:16}}>📋 提交列表</h3>
        {subs.length>0?<Table columns={[
          {key:'userId',title:'提交者',render:v=>{const u=MOCK.students.find(s=>s.id===v);return <span style={{fontWeight:600}}>{u?.realName||u?.name||'—'}</span>;}},
          {key:'data',title:'歌曲名',render:v=><span>{v?.songTitle||'—'}</span>},
          {key:'data',title:'创作工具',render:v=><span style={{fontSize:12,color:'var(--text3)'}}>{(v?.aiTool||[]).join(', ')||'—'}</span>},
          {key:'submittedAt',title:'提交时间'},
          {key:'status',title:'状态',render:v=>{const s=SUB_STATUS[v];return <span style={{fontSize:12,color:s?.c}}>{s?.l}</span>;}},
          {key:'score',title:'评分',render:v=>v!=null?<span style={{fontWeight:600,color:v>=80?'var(--green2)':'var(--orange)'}}>{v}</span>:'-'},
          {key:'id',title:'操作',render:(v,r)=><div style={{display:'flex',gap:4}}>
            {r.status==='pending_review'&&<Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>showToast('已打开评审页面')}>评审</Btn>}
            <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>showToast('已查看提交详情')}>详情</Btn>
          </div>},
        ]} data={subs}/>:<Empty text="暂无提交"/>}
      </div>
      <div style={parseStyle(css.card)}>
        <h3 style={{fontSize:15,fontWeight:600,marginBottom:12}}>📝 作业信息</h3>
        {[['作业标题',asn.title],['所属用户组',grp?.name],['描述',asn.description],['截止时间',asn.deadline],['状态',asn.status==='active'?'进行中':'已截止'],['创建时间',asn.createdAt]].map(([k,v])=>
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:'#f0f4fb',borderRadius:6,marginBottom:6,fontSize:13}}><span style={{color:'var(--text3)'}}>{k}</span><span>{v}</span></div>
        )}
      </div>
    </PageLayout>;
  }

  // 作业列表
  const filteredAssignments=selectedGroup?MOCK.assignments.filter(a=>a.groupId===+selectedGroup):MOCK.assignments;
  return <PageLayout title="作业管理" subtitle={`共 ${MOCK.assignments.length} 个作业`} actions={<Btn onClick={()=>setCreateModal(true)}>+ 创建作业</Btn>}>
    <div style={{display:'flex',gap:12,marginBottom:20}}>
      <select style={{...parseStyle(css.input),width:240}} value={selectedGroup} onChange={e=>setSelectedGroup(e.target.value)}>
        <option value="">全部用户组</option>
        {MOCK.userGroups.filter(g=>g.status==='active').map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
      </select>
    </div>
    <div style={parseStyle(css.card)}>
      <Table columns={[
        {key:'title',title:'作业标题',render:(v,r)=><span style={{fontWeight:600}}>{v}</span>},
        {key:'groupId',title:'用户组',render:v=>MOCK.userGroups.find(g=>g.id===v)?.name||'—'},
        {key:'deadline',title:'截止时间'},
        {key:'submissionCount',title:'提交',render:(v,r)=><span>{v}/{r.totalMembers} <span style={{fontSize:11,color:'var(--text3)'}}>({Math.round(v/r.totalMembers*100)}%)</span></span>},
        {key:'status',title:'状态',render:v=>v==='active'?<span style={{color:'var(--green2)',fontSize:12}}>进行中</span>:<span style={{color:'var(--text3)',fontSize:12}}>已截止</span>},
        {key:'id',title:'操作',render:(v,r)=><div style={{display:'flex',gap:4}}>
          <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>setFieldConfigModal(r)}>⚙️ 表单</Btn>
          <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={()=>setDetail(v)}>详情 →</Btn>
        </div>},
      ]} data={filteredAssignments} onRowClick={r=>setDetail(r.id)}/>
    </div>

    {/* 创建作业 Modal */}
    <Modal title="创建作业" open={createModal} onClose={()=>setCreateModal(false)} width={600}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div><label style={parseStyle(css.label)}>所属用户组 *</label>
          <select style={parseStyle(css.input)}>
            <option value="">请选择用户组...</option>
            {MOCK.userGroups.filter(g=>g.status==='active').map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
          </select>
        </div>
        <div><label style={parseStyle(css.label)}>作业标题 *</label><input style={parseStyle(css.input)} placeholder="如：第一次AI音乐创作作业"/></div>
        <div><label style={parseStyle(css.label)}>作业描述</label><textarea style={{...parseStyle(css.input),height:60,resize:'vertical'}} placeholder="描述作业要求..."/></div>
        <div><label style={parseStyle(css.label)}>截止时间 *</label><input style={parseStyle(css.input)} type="date" defaultValue="2026-05-31"/></div>
        <div style={{padding:12,background:'rgba(108,92,231,.08)',borderRadius:8,fontSize:12,color:'var(--accent2)'}}>
          💡 创建后可在「⚙️ 表单配置」中设置每个字段的必填/选填状态和默认值。默认使用系统标准表单模板（9个字段）。
        </div>
        <Btn style="width:100%;justify-content:center;" onClick={()=>{setCreateModal(false);showToast('✅ 作业创建成功！已使用默认表单配置')}}>创建作业</Btn>
      </div>
    </Modal>

    {/* ★ 表单字段配置 Modal */}
    <Modal title={`表单配置 · ${fieldConfigModal?.title||''}`} open={!!fieldConfigModal} onClose={()=>setFieldConfigModal(null)} width={700}>
      {fieldConfigModal&&<div>
        <div style={{fontSize:13,color:'var(--text3)',marginBottom:16}}>配置该作业的提交表单字段。设置每个字段为必填或选填，并配置默认值。</div>
        <div style={{border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{background:'#f0f4fb'}}>
              <th style={{padding:'10px 12px',textAlign:'left',fontWeight:500,color:'var(--text2)',fontSize:12}}>字段名</th>
              <th style={{padding:'10px 12px',textAlign:'left',fontWeight:500,color:'var(--text2)',fontSize:12}}>类型</th>
              <th style={{padding:'10px 12px',textAlign:'center',fontWeight:500,color:'var(--text2)',fontSize:12}}>必填</th>
              <th style={{padding:'10px 12px',textAlign:'left',fontWeight:500,color:'var(--text2)',fontSize:12}}>默认值</th>
            </tr></thead>
            <tbody>
              {(fieldConfigModal.formFields||MOCK.defaultFormFields).map((f,i)=>{
                const typeLabels={text:'文本',textarea:'长文本',multi_select:'多选'};
                return <tr key={f.key} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={{padding:'10px 12px',fontWeight:500}}>{f.label}</td>
                  <td style={{padding:'10px 12px'}}><span style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:'#f8faff',color:'var(--text3)'}}>{typeLabels[f.type]||f.type}</span></td>
                  <td style={{padding:'10px 12px',textAlign:'center'}}>
                    <button onClick={()=>showToast(`已切换「${f.label}」为${f.required?'选填':'必填'}`)} style={{background:'none',border:'none',cursor:'pointer',fontSize:18}}>{f.required?'✅':'⬜'}</button>
                  </td>
                  <td style={{padding:'10px 12px'}}>
                    {f.type==='multi_select'
                      ?<span style={{fontSize:11,color:'var(--text3)'}}>选项：{(f.options||[]).join(', ')}</span>
                      :<input style={{...parseStyle(css.input),padding:'6px 10px',fontSize:12}} defaultValue={f.defaultValue||''} placeholder="留空 或 {realName} / {songTitle}"/>
                    }
                  </td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
        <div style={{marginTop:12,padding:10,background:'#f0f4fb',borderRadius:8,fontSize:12,color:'var(--text3)'}}>
          💡 可用变量：<code style={{color:'var(--accent2)'}}>{'{{realName}}'}</code> = 当前用户实名，<code style={{color:'var(--accent2)'}}>{'{{songTitle}}'}</code> = 歌曲标题（联动）
        </div>
        <div style={{marginTop:16,display:'flex',justifyContent:'space-between'}}>
          <Btn variant="ghost" onClick={()=>showToast('已重置为默认模板')}>🔄 重置为默认模板</Btn>
          <Btn onClick={()=>{setFieldConfigModal(null);showToast('✅ 表单配置已保存')}}>保存配置</Btn>
        </div>
      </div>}
    </Modal>
  </PageLayout>;
}

          {key:'realNameStatus',title:'实名',render:v=>{const m={verified:{l:'已认证',c:'var(--green2)'},pending:{l:'待审核',c:'var(--orange)'},rejected:{l:'已驳回',c:'var(--red)'}};const s=m[v];return s?<span style={{fontSize:12,color:s.c}}>{s.l}</span>:<span style={{fontSize:12,color:'var(--text3)'}}>未认证</span>;}},
          {key:'phone',title:'手机号'},
          {key:'id',title:'操作',render:(v,r)=><div style={{display:'flex',gap:4}}>

function PermissionTree({ value, onChange }) {
  // value: { 'student.home.view': true, ... }
  const val = value || {};

  const isPortalChecked = (portal) => portal.children.every(m => m.actions.every(a => val[`${m.key}.${a}`]));
  const isPortalIndet = (portal) => !isPortalChecked(portal) && portal.children.some(m => m.actions.some(a => val[`${m.key}.${a}`]));
  const isMenuChecked = (menu) => menu.actions.every(a => val[`${menu.key}.${a}`]);
  const isMenuIndet = (menu) => !isMenuChecked(menu) && menu.actions.some(a => val[`${menu.key}.${a}`]);

  const togglePortal = (portal) => {
    const all = isPortalChecked(portal);
    const next = { ...val };
    portal.children.forEach(m => m.actions.forEach(a => { next[`${m.key}.${a}`] = !all; }));
    onChange(next);
  };
  const toggleMenu = (menu) => {
    const all = isMenuChecked(menu);
    const next = { ...val };
    menu.actions.forEach(a => { next[`${menu.key}.${a}`] = !all; });
    onChange(next);
  };
  const toggleAction = (menuKey, action) => {
    onChange({ ...val, [`${menuKey}.${action}`]: !val[`${menuKey}.${action}`] });
  };
  const selectAll = () => {
    const next = {};
    PERMISSION_TREE.forEach(p => p.children.forEach(m => m.actions.forEach(a => { next[`${m.key}.${a}`] = true; })));
    onChange(next);
  };
  const clearAll = () => onChange({});

  return <div>
    <div style={{ marginBottom: 12, display: 'flex', gap: 12 }}>
      <span onClick={selectAll} style={{ fontSize: 13, color: 'var(--accent2)', cursor: 'pointer' }}>全选</span>
      <span onClick={clearAll} style={{ fontSize: 13, color: 'var(--accent2)', cursor: 'pointer' }}>不全选</span>
    </div>
    {PERMISSION_TREE.map(portal => (
      <div key={portal.key} style={{ marginBottom: 16 }}>
        {/* Portal level */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 0', borderBottom: '1px solid var(--border)', marginBottom: 8 }}>
          <input type="checkbox" checked={isPortalChecked(portal)} ref={el => { if(el) el.indeterminate = isPortalIndet(portal); }}
            onChange={() => togglePortal(portal)} style={{ width: 15, height: 15, cursor: 'pointer', accentColor: 'var(--accent2)' }} />
          <span style={{ fontSize: 14, fontWeight: 600 }}>{portal.icon} {portal.portal}</span>
        </div>
        {/* Menu items */}
        <div style={{ paddingLeft: 20 }}>
          {portal.children.map(menu => (
            <div key={menu.key} style={{ marginBottom: 8 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                <input type="checkbox" checked={isMenuChecked(menu)} ref={el => { if(el) el.indeterminate = isMenuIndet(menu); }}
                  onChange={() => toggleMenu(menu)} style={{ width: 14, height: 14, cursor: 'pointer', accentColor: 'var(--accent2)' }} />
                <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--text1)' }}>{menu.label}</span>
              </div>
              <div style={{ paddingLeft: 22, display: 'flex', flexWrap: 'wrap', gap: '4px 16px' }}>
                {menu.actions.map(action => (
                  <label key={action} style={{ display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer', fontSize: 12, color: 'var(--text3)' }}>
                    <input type="checkbox" checked={!!val[`${menu.key}.${action}`]} onChange={() => toggleAction(menu.key, action)}
                      style={{ width: 13, height: 13, accentColor: 'var(--accent2)' }} />
                    {ACTION_LABELS[action] || action}
                  </label>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    ))}
  </div>;
}

    setView('edit');
  };

    if (!form.name.trim()) { showToast('❌ 请输入角色名称'); return; }
    if (editRole) {
      setRoles(r => r.map(x => x.id === editRole.id ? { ...x, ...form } : x));

            <label style={parseStyle(css.label)}>* 账号</label>
            <input style={parseStyle(css.input)} placeholder="请输入账号" value={form.account}
              onChange={e => setForm(f => ({ ...f, account: e.target.value }))} disabled={view === 'edit'} />
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={parseStyle(css.label)}>* 名称</label>
            <input style={parseStyle(css.input)} placeholder="请输入名称" value={form.name}
              onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={parseStyle(css.label)}>* 角色</label>
            <select style={parseStyle(css.input)} value={form.roleId} onChange={e => setForm(f => ({ ...f, roleId: e.target.value }))}>
              <option value="">请选择角色</option>
              {MOCK_ROLES.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </div>
          {view === 'add' && <>
            <div style={{ marginBottom: 14 }}>
              <label style={parseStyle(css.label)}>* 密码</label>
              <input style={parseStyle(css.input)} type="password" placeholder="请输入密码" value={form.password}
                onChange={e => setForm(f => ({ ...f, password: e.target.value }))} />
            </div>
            <div style={{ marginBottom: 14 }}>
              <label style={parseStyle(css.label)}>* 确认密码</label>
              <input style={parseStyle(css.input)} type="password" placeholder="请输入确认密码" value={form.confirmPassword}
                onChange={e => setForm(f => ({ ...f, confirmPassword: e.target.value }))} />
            </div>
          </>}
          <div style={{ marginBottom: 14, display: 'flex', alignItems: 'center', gap: 12 }}>
            <label style={{ ...parseStyle(css.label), marginBottom: 0, minWidth: 80 }}>管理员状态</label>
            <div onClick={() => setForm(f => ({ ...f, status: !f.status }))} style={{ width: 44, height: 24, borderRadius: 12, background: form.status ? 'var(--accent2)' : '#ccc', cursor: 'pointer', position: 'relative', transition: 'background .2s', flexShrink: 0 }}>
              <div style={{ width: 18, height: 18, background: '#fff', borderRadius: '50%', position: 'absolute', top: 3, left: form.status ? 23 : 3, transition: 'left .2s', boxShadow: '0 1px 3px rgba(0,0,0,.2)' }} />
            </div>
          </div>
          <div style={{ marginBottom: 20, display: 'flex', alignItems: 'center', gap: 12 }}>
            <label style={{ ...parseStyle(css.label), marginBottom: 0, minWidth: 80 }}>支持多处登录</label>
            <div onClick={() => setForm(f => ({ ...f, multiLogin: !f.multiLogin }))} style={{ width: 44, height: 24, borderRadius: 12, background: form.multiLogin ? 'var(--accent2)' : '#ccc', cursor: 'pointer', position: 'relative', transition: 'background .2s', flexShrink: 0 }}>
              <div style={{ width: 18, height: 18, background: '#fff', borderRadius: '50%', position: 'absolute', top: 3, left: form.multiLogin ? 23 : 3, transition: 'left .2s', boxShadow: '0 1px 3px rgba(0,0,0,.2)' }} />
            </div>
          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={parseStyle(css.label)}>管理员头像</label>
            <div style={{ width: 80, height: 80, border: '1px dashed var(--border)', borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'var(--text3)', fontSize: 12 }}
              onClick={() => showToast('图片上传功能开发中')}>
              {form.avatar ? <span style={{ fontSize: 36 }}>{form.avatar}</span> : <span>添加图片</span>}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 12 }}>
            <Btn onClick={handleSave}>保存</Btn>
            <Btn variant="ghost" onClick={() => setView('list')}>取消</Btn>
          </div>
        </div>
      </div>
    </PageLayout>;
  }

  return <PageLayout title="平台管理员" subtitle="这是管理员页面，默认管理员。" actions={<Btn onClick={openAdd}>+ 添加管理员</Btn>}>
    {/* 搜索栏 */}
    <div style={{ ...parseStyle(css.card), marginBottom: 16, display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 13, color: 'var(--text3)', whiteSpace: 'nowrap' }}>账号</span>
        <input style={{ ...parseStyle(css.input), width: 160, marginBottom: 0 }} placeholder="请输入账号"
          value={searchAccount} onChange={e => setSearchAccount(e.target.value)} />
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 13, color: 'var(--text3)', whiteSpace: 'nowrap' }}>名称</span>
        <input style={{ ...parseStyle(css.input), width: 160, marginBottom: 0 }} placeholder="请输入名称"
          value={searchName} onChange={e => setSearchName(e.target.value)} />
      </div>
      <Btn onClick={() => {}}>查询</Btn>
      <Btn variant="ghost" onClick={() => { setSearchAccount(''); setSearchName(''); }}>重置</Btn>
      <Btn variant="ghost" onClick={() => showToast('已导出管理员列表.xlsx')}>导出</Btn>
    </div>
    <div style={parseStyle(css.card)}>
      <Table columns={[
        { key: 'avatar', title: '头像', render: v => <span style={{ fontSize: 24 }}>{v}</span> },
        { key: 'account', title: '账号', render: v => <span style={{ fontWeight: 600, fontFamily: 'monospace' }}>{v}</span> },
        { key: 'name', title: '名称', render: v => <span style={{ fontWeight: 500 }}>{v}</span> },
        { key: 'roleName', title: '角色', render: v => <span style={{ fontSize: 12, padding: '2px 8px', borderRadius: 10, background: 'rgba(108,92,231,.1)', color: 'var(--accent2)' }}>{v}</span> },
        { key: 'createdAt', title: '创建时间', render: v => <span style={{ fontSize: 12, color: 'var(--text3)' }}>{v}</span> },
        { key: 'lastLogin', title: '最后登录时间', render: v => <span style={{ fontSize: 12, color: 'var(--text3)' }}>{v}</span> },
        { key: 'lastIp', title: '最后登录IP', render: v => <span style={{ fontSize: 12, color: 'var(--text3)', fontFamily: 'monospace' }}>{v}</span> },
        { key: 'status', title: '状态', render: (v, r) => <div onClick={() => handleToggleStatus(r)} style={{ width: 44, height: 24, borderRadius: 12, background: v ? 'var(--accent2)' : '#ccc', cursor: 'pointer', position: 'relative', transition: 'background .2s', display: 'inline-block' }}>
            <div style={{ width: 18, height: 18, background: '#fff', borderRadius: '50%', position: 'absolute', top: 3, left: v ? 23 : 3, transition: 'left .2s', boxShadow: '0 1px 3px rgba(0,0,0,.2)' }} />
          </div>
        },
        { key: 'id', title: '操作', render: (v, r) => <Btn variant="ghost" style="font-size:11px;padding:4px 10px;" onClick={() => openEdit(r)}>编辑</Btn> },
      ]} data={filtered} />
    </div>
  </PageLayout>;
}

// ═══════════════════════════════════════════
// MAIN APP


function App(){
  const [role,setRole]=useState(null);
  const [page,setPage]=useState('admin_dashboard');
  const [toast,setToast]=useState('');
  const [reviewSong,setReviewSong]=useState(null);
  const [songs,setSongs]=useState(()=>MOCK.songs.map(s=>({...s})));
  const [assignmentSubs,setAssignmentSubs]=useState(()=>MOCK.assignmentSubmissions.map(s=>({...s})));
  const showToast=useCallback((msg)=>{setToast(msg);setTimeout(()=>setToast(''),3000);},[]);
  const nav=useCallback((p)=>{setPage(p);window.scrollTo(0,0);},[]);
  useEffect(()=>{ if(role==='admin')setPage('admin_dashboard'); },[role]);
  const ctx=useMemo(()=>({nav,showToast,reviewSong,setReviewSong,songs,setSongs,assignmentSubs,setAssignmentSubs}),[nav,showToast,reviewSong,songs,assignmentSubs]);
  if(!role)return <LoginPage onLogin={r=>setRole(r)}/>;
  const menus=[
    {key:'d1',label:'总览',divider:true},
    {key:'admin_dashboard',label:'运营看板',icon:'📊'},
    {key:'d2',label:'内容',divider:true},
    {key:'admin_cms',label:'内容管理',icon:'📝'},
    {key:'d3',label:'用户与权限',divider:true},
    {key:'admin_groups',label:'用户组管理',icon:'🏘️'},
    {key:'admin_assignments',label:'作业管理',icon:'📝'},
    {key:'admin_students',label:'用户档案',icon:'👥'},
    {key:'admin_contracts',label:'合同台账',icon:'📄'},
    {key:'admin_teachers',label:'评审绩效',icon:'🎧'},
    {key:'admin_accounts',label:'账号与权限',icon:'🔑'},
    {key:'admin_admins',label:'平台管理员',icon:'👤'},
    {key:'admin_roles',label:'角色管理',icon:'🛡️'},
    {key:'d4',label:'歌曲',divider:true},
    {key:'admin_songs',label:'歌曲库管理',icon:'🎵'},
    {key:'admin_batch_download',label:'作品库批量下载',icon:'⬇️'},
    {key:'admin_isrc',label:'ISRC管理',icon:'🔖'},
    {key:'admin_distributions',label:'发行渠道',icon:'🌐'},
    {key:'admin_publish_confirm',label:'发行状态确认',icon:'✅'},
    {key:'d5',label:'收益',divider:true},
    {key:'admin_revenue',label:'收益管理',icon:'💰'},
    {key:'d6',label:'系统',divider:true},
    {key:'admin_settings',label:'系统设置',icon:'⚙️'},
    {key:'admin_logs',label:'操作日志',icon:'📋'},
  ];
  const pages={admin_dashboard:<AdminDashboard/>,admin_students:<AdminStudents/>,admin_contracts:<AdminContracts/>,admin_songs:<AdminSongs/>,admin_revenue:<AdminRevenue/>,admin_cms:<AdminCMS/>,admin_batch_download:<AdminBatchDownload/>,admin_publish_confirm:<AdminPublishConfirm/>,admin_distributions:<AdminDistributions/>,admin_settings:<AdminSettings/>,admin_logs:<AdminLogs/>,admin_isrc:<AdminISRC/>,admin_teachers:<AdminTeachers/>,admin_accounts:<AdminAccounts/>,admin_groups:<AdminUserGroups/>,admin_assignments:<AdminAssignments/>,admin_roles:<AdminRoles/>,admin_admins:<AdminPlatformAdmins/>};
  return <AppContext.Provider value={ctx}>
    <Sidebar items={menus} active={page} onNav={nav} role="admin" onLogout={()=>{setRole(null);setPage('admin_dashboard');}}/>
    {pages[page]||<PageLayout title="页面不存在"><Empty text="请从侧边栏选择功能"/></PageLayout>}
    <Toast message={toast}/>
  </AppContext.Provider>;
}
ReactDOM.render(<App/>,document.getElementById('root'));

</script>
