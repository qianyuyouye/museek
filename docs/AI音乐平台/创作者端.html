function WaveformPlayer({small=false}){
  const bars=small?20:40;
  const heights=useMemo(()=>Array.from({length:bars}).map(()=>8+Math.random()*(small?22:42)),[bars,small]);
  const delays=useMemo(()=>Array.from({length:bars}).map(()=>[0.5+Math.random()*0.8,Math.random()*0.5]),[bars]);
  return <div style={{display:'flex',alignItems:'end',gap:small?2:3,height:small?30:50,padding:'8px 0'}}>
    {heights.map((h,i)=><div key={i} style={{width:small?3:4,borderRadius:2,background:`linear-gradient(to top, #6366f1, #818cf8)`,animation:`waveAnim ${delays[i][0]}s ease-in-out ${delays[i][1]}s infinite`,height:h}}/>)}
    <div style={{marginLeft:8,fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>{small?'0:30':'3:24'} / {small?'0:30':'3:24'}</div>

}

        {columns.map((c,ci)=><td key={ci} style={{padding:'12px',borderBottom:'1px solid var(--border)',color:'var(--text)'}}>{c.render?c.render(row[c.key],row):row[c.key]}</td>)}
      </tr>)}</tbody>
    </table>
  </div>;
}

function parseStyle(str){
  if(typeof str!=='string')return str;
  const obj={};
  str.split(';').forEach(p=>{
    const [k,v]=p.split(':').map(s=>s&&s.trim());
    if(k&&v){
      const key=k.replace(/-([a-z])/g,(_,c)=>c.toUpperCase());
      obj[key]=v;
    }
  });
  return obj;
}

function Toast({message,type='success'}){
  if(!message)return null;
  const colors={success:'var(--green)',error:'var(--red)',info:'var(--accent2)'};
  return <div className="fade-in" style={{position:'fixed',top:20,right:20,zIndex:9999,padding:'12px 24px',borderRadius:10,background:'#fff',border:`1px solid ${colors[type]}`,color:colors[type],fontSize:14,fontWeight:500,boxShadow:'0 8px 32px rgba(0,0,0,.4)'}}>
    {type==='success'?'✅':type==='error'?'❌':'ℹ️'} {message}
  </div>;
}

  </div>;
}

function StudentHome(){

  const avgScore=scoredSongs.length>0?(scoredSongs.reduce((a,s)=>a+s.score,0)/scoredSongs.length).toFixed(1):0;
  const myRevenue=MOCK.students.find(s=>s.id===currentUserId)?.totalRevenue||0;
  const pendingAssignments=MOCK.assignments.filter(a=>a.status==='active'&&MOCK.students[0].groupIds.includes(a.groupId));
  const mySubmissions=assignmentSubs.filter(s=>s.userId===currentUserId);

  return <PageLayout title="首页" subtitle="欢迎回来，张小明">

      <StatCard icon="🎵" label="我的作品" value={mySongs.length} color="var(--accent2)"/>

    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20}}>
      <div style={parseStyle(css.card)}>
        <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>📢 最新动态</h3>
        {MOCK.notifications.slice(0,3).map(n=><div key={n.id} style={{padding:'12px 0',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

          <span style={{fontSize:11,color:'var(--text3)',whiteSpace:'nowrap'}}>{n.time.split(' ')[0]}</span>

      </div>
      <div style={parseStyle(css.card)}>
        <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>🔥 热门课程</h3>
        {MOCK.courses.filter(c=>c.status==='published').slice(0,3).map(c=><div key={c.id} onClick={()=>nav('courses')} style={{padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>

            :<div><p>本文将系统介绍{courseDetail.title}的相关知识，帮助你建立扎实的音乐理论基础。</p><p style={{marginTop:8}}>文章涵盖核心概念、实际应用场景以及与AI音乐创作的结合方法。通过学习本文内容，你将能够更好地理解音乐结构，提升Prompt编写的精准度。</p><p style={{marginTop:12,color:'var(--text3)'}}>阅读时长：约10分钟 | 适合人群：零基础 ~ 初级</p></div>
          }
        </div>
      </div>}
    </Modal>
  </PageLayout>;
}

            setStep(1);setForm({title:'',lyricist:'',composer:'',aiTool:'Suno',prompt:'',genre:'Pop',bpm:'120',lyrics:'',contribution:'主导',creationDesc:'',originality:false});

  </PageLayout>;
}

            <div><Badge status={song.status}/><div style={{fontSize:18,fontWeight:600,marginTop:6}}>{song.title}</div><div style={{fontSize:13,color:'var(--text3)'}}>上传于 {song.createdAt}</div></div>

            {[['作词',song.lyricist],['作曲',song.composer],['AI工具',song.aiTool],['流派',song.genre],['BPM',song.bpm],['ISRC',song.isrc||'待申报']].map(([k,v])=>
              <div key={k} style={{padding:8,background:'#f0f4fb',borderRadius:6}}><span style={{color:'var(--text3)'}}>{k}：</span>{v}</div>

          {song.status==='needs_revision'&&<div style={{marginTop:16}}>
            <Btn onClick={()=>{showToast('已进入修改模式');setDetail(null);nav('upload');}}>📝 修改并重新提交</Btn>
          </div>}

        <div>
          {review&&<div style={{...parseStyle(css.card),marginBottom:16}}>
            <h3 style={{fontSize:15,fontWeight:600,marginBottom:14}}>📊 评分成绩单</h3>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
              {[['技术',review.technique,'30%'],['创意',review.creativity,'40%'],['商业',review.commercial,'30%']].map(([l,v,w])=>
                <div key={l} style={{textAlign:'center',padding:12,background:'#f0f4fb',borderRadius:8}}>
                  <div style={{fontSize:24,fontWeight:700,color:v>=80?'var(--green2)':v>=60?'var(--orange)':'var(--red)'}}>{v}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>{l} ({w})</div>
                </div>
              )}

            <div style={{textAlign:'center',padding:16,background:'linear-gradient(135deg,rgba(108,92,231,.1),rgba(0,206,201,.1))',borderRadius:10,marginBottom:14}}>
              <div style={{fontSize:12,color:'var(--text3)'}}>加权总分</div>
              <div style={{fontSize:36,fontWeight:700,color:review.total>=80?'var(--green2)':'var(--orange)'}}>{review.total}</div>
            </div>
            <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.8,padding:12,background:'#f0f4fb',borderRadius:8}}>
              <div style={{fontWeight:600,marginBottom:6,color:'var(--text)'}}>老师评语：</div>{review.comment}
            </div>
            {review.markers?.length>0&&<div style={{marginTop:12,fontSize:12}}>
              <div style={{fontWeight:500,marginBottom:6,color:'var(--text3)'}}>波形标记：</div>
              {review.markers.map((m,i)=><span key={i} style={{display:'inline-block',marginRight:8,marginBottom:4,padding:'3px 8px',borderRadius:4,background:m.type==='highlight'?'rgba(85,239,196,.12)':'rgba(255,107,107,.12)',color:m.type==='highlight'?'var(--green2)':'var(--red)',fontSize:11}}>⏱ {m.time}s - {m.label}</span>)}

    <Tab tabs={tabs} active={tab} onChange={setTab}/>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:16}}>
      {filtered.map(s=><div key={s.id} onClick={()=>setDetail(s.id)} style={{...parseStyle(css.card),cursor:'pointer',transition:'all .25s',overflow:'hidden'}} onMouseOver={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.transform='translateY(-2px)'}} onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.transform=''}}>
        <div style={{fontSize:48,textAlign:'center',padding:16,background:'#f0f4fb',borderRadius:10,marginBottom:10}}>{s.cover}</div>
        <Badge status={s.status}/>
        <div style={{fontSize:14,fontWeight:600,marginTop:6,marginBottom:4}}>{s.title}</div>
        <div style={{fontSize:12,color:'var(--text3)',display:'flex',justifyContent:'space-between'}}>
          <span>{s.genre}</span>
          <span>{s.score?`${s.score}分`:'-'}</span>
        </div>
        {s.status==='published'&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>❤️ {s.likeCount}</div>}
      </div>)}
    </div>
  </PageLayout>;
}

function CreatorAssignments(){
  const {showToast,assignmentSubs,setAssignmentSubs,songs,setSongs}=useApp();
  const currentUser=MOCK.students[0]; // 张小明, groupIds:[1]
  const myGroups=MOCK.userGroups.filter(g=>(currentUser.groupIds||[]).includes(g.id));
  const myAssignments=MOCK.assignments.filter(a=>myGroups.some(g=>g.id===a.groupId));
  const mySubmissions=assignmentSubs.filter(s=>s.userId===currentUser.id);
  const [activeAssignment,setActiveAssignment]=useState(null);
  const [formData,setFormData]=useState({});
  const [audioUploaded,setAudioUploaded]=useState(false);
  const [submittedView,setSubmittedView]=useState(null);

  const resolveDefault=(val)=>{
    if(!val)return '';
    return val.replace('{realName}',currentUser.realName||currentUser.name).replace('{songTitle}',formData.songTitle||'');
  };

  const initForm=(fields)=>{
    const d={};
    fields.forEach(f=>{
      if(f.type==='multi_select') d[f.key]=f.defaultValue||[];
      else d[f.key]=resolveDefault(f.defaultValue);
    });
    return d;
  };

  // 查看已提交作业
  if(submittedView){
    const sub=assignmentSubs.find(s=>s.id===submittedView);
    const asn=MOCK.assignments.find(a=>a.id===sub?.assignmentId);
    const grp=MOCK.userGroups.find(g=>g.id===asn?.groupId);
    // 从 songs 状态中找对应歌曲（获取最新评审结果）
    const linkedSong=songs.find(s=>s.source==='assignment'&&s.assignmentId===sub?.assignmentId&&s.userId===currentUser.id&&s.title===sub?.data?.songTitle);
    if(!sub)return null;
    const SUB_STATUS={pending_review:{l:'待评审',c:'var(--orange)',bg:'rgba(253,203,110,.12)'},reviewed:{l:'已评审',c:'var(--green2)',bg:'rgba(85,239,196,.12)'},needs_revision:{l:'需修改',c:'var(--red)',bg:'rgba(255,107,107,.12)'}};
    // 优先使用 songs 中的最新状态
    const liveStatus=linkedSong?.status==='needs_revision'?'needs_revision':linkedSong?.status==='ready_to_publish'||linkedSong?.status==='published'?'reviewed':sub.status;
    const liveScore=linkedSong?.score??sub.score;
    const st=SUB_STATUS[liveStatus]||SUB_STATUS.pending_review;
    return <PageLayout title={sub.data.songTitle} subtitle={`${grp?.name} · ${asn?.title}`} actions={<Btn variant="ghost" onClick={()=>setSubmittedView(null)}>← 返回作业列表</Btn>}>

          </div>
          {Object.entries(sub.data).map(([k,v])=>{
            const fieldDef=(asn?.formFields||[]).find(f=>f.key===k);
            return <div key={k} style={{padding:'8px 12px',background:'#f0f4fb',borderRadius:6,marginBottom:6,fontSize:13}}>
              <span style={{color:'var(--text3)'}}>{fieldDef?.label||k}：</span>
              <span style={{whiteSpace:'pre-wrap'}}>{Array.isArray(v)?v.join(', '):v}</span>
            </div>;
          })}
          <div style={{marginTop:12,fontSize:12,color:'var(--text3)'}}>提交时间：{sub.submittedAt}</div>
        </div>
        <div style={parseStyle(css.card)}>
          <h3 style={{fontSize:15,fontWeight:600,marginBottom:16}}>🎵 音频文件</h3>
          <WaveformPlayer/>
          {liveScore!=null&&<div style={{marginTop:16}}>
            <h3 style={{fontSize:15,fontWeight:600,marginBottom:12}}>📊 评审结果</h3>
            <div style={{textAlign:'center',padding:20,background:'linear-gradient(135deg,rgba(108,92,231,.1),rgba(0,206,201,.1))',borderRadius:10}}>
              <div style={{fontSize:12,color:'var(--text3)'}}>评分</div>
              <div style={{fontSize:42,fontWeight:700,color:liveScore>=80?'var(--green2)':'var(--orange)'}}>{liveScore}</div>
            </div>
            {liveStatus==='needs_revision'&&linkedSong?.reviewComment&&<div style={{marginTop:12,padding:12,background:'rgba(255,107,107,.08)',borderRadius:8,fontSize:13,color:'var(--red)'}}>
              📝 老师评语：{linkedSong.reviewComment}
            </div>}
          </div>}
          {liveStatus==='pending_review'&&<div style={{marginTop:16,padding:16,background:'rgba(253,203,110,.06)',borderRadius:8,textAlign:'center'}}>
            <div style={{fontSize:32}}>⏳</div>
            <p style={{fontSize:13,color:'var(--text2)',marginTop:8}}>等待评审中...</p>
          </div>}
        </div>
      </div>
    </PageLayout>;
  }

  // 作业提交表单
  if(activeAssignment){
    const asn=MOCK.assignments.find(a=>a.id===activeAssignment);
    const grp=MOCK.userGroups.find(g=>g.id===asn?.groupId);
    const existingSub=mySubmissions.find(s=>s.assignmentId===activeAssignment);
    if(existingSub)return <PageLayout title={asn.title} subtitle={`${grp?.name} — 已提交`} actions={<Btn variant="ghost" onClick={()=>setActiveAssignment(null)}>← 返回</Btn>}>
      <div style={parseStyle(css.card)}>
        <div style={{textAlign:'center',padding:32}}>
          <div style={{fontSize:56}}>✅</div>
          <h3 style={{fontSize:18,fontWeight:600,marginTop:12}}>你已提交本次作业</h3>
          <p style={{color:'var(--text3)',marginTop:8,fontSize:13}}>提交时间：{existingSub.submittedAt}</p>
          <div style={{marginTop:16,display:'flex',gap:8,justifyContent:'center'}}>
            <Btn onClick={()=>{setActiveAssignment(null);setSubmittedView(existingSub.id)}}>查看提交详情</Btn>
            <Btn variant="ghost" onClick={()=>setActiveAssignment(null)}>返回列表</Btn>
          </div>
        </div>
      </div>
    </PageLayout>;

    if(Object.keys(formData).length===0&&asn){setFormData(initForm(asn.formFields));return null;}

    return <PageLayout title={`提交作业 · ${asn.title}`} subtitle={`${grp?.name} · 截止 ${asn.deadline}`} actions={<Btn variant="ghost" onClick={()=>{setActiveAssignment(null);setFormData({});setAudioUploaded(false)}}>← 返回</Btn>}>
      <div style={parseStyle(css.card)}>
        {/* 音频上传 */}
        <h3 style={{fontSize:15,fontWeight:600,marginBottom:16}}>🎵 上传音频文件</h3>
        <div style={{border:'2px dashed var(--border)',borderRadius:12,padding:32,textAlign:'center',cursor:'pointer',transition:'all .2s',marginBottom:24}} onMouseOver={e=>e.currentTarget.style.borderColor='var(--accent)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'} onClick={()=>setAudioUploaded(true)}>
          {audioUploaded?<div><span style={{fontSize:36}}>✅</span><p style={{marginTop:6,color:'var(--green)',fontSize:13}}>my_song.wav 已上传 (3.2MB, 3:18)</p></div>
          :<div><span style={{fontSize:36}}>🎵</span><p style={{marginTop:6,color:'var(--text2)',fontSize:13}}>点击或拖拽上传音频文件</p><p style={{fontSize:11,color:'var(--text3)'}}>支持 WAV / MP3，最大 50MB</p></div>}
        </div>

        {/* 动态表单 */}
        <h3 style={{fontSize:15,fontWeight:600,marginBottom:16}}>📋 作品元数据</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {(asn.formFields||[]).map(field=>{
            const val=formData[field.key];
            // 动态解析默认值（{songTitle}跟随歌曲标题联动）
            const liveDefault=field.defaultValue==='{songTitle}'?(formData.songTitle||''):null;
            if(liveDefault!==null&&val===''&&formData.songTitle){setFormData(p=>({...p,[field.key]:formData.songTitle}));}

            if(field.type==='multi_select'){
              return <div key={field.key} style={{gridColumn:field.key==='lyrics'?'1/3':'auto'}}>
                <label style={parseStyle(css.label)}>{field.label} {field.required&&<span style={{color:'var(--red)'}}>*</span>}{!field.required&&<span style={{color:'var(--text3)',fontSize:11}}>选填</span>}</label>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {(field.options||[]).map(opt=>{
                    const selected=(val||[]).includes(opt);
                    return <button key={opt} onClick={()=>{
                      setFormData(p=>({...p,[field.key]:selected?(p[field.key]||[]).filter(x=>x!==opt):[...(p[field.key]||[]),opt]}));
                    }} style={{padding:'8px 16px',borderRadius:8,border:`1px solid ${selected?'var(--accent)':'var(--border)'}`,background:selected?'var(--accent-glow)':'var(--bg2)',color:selected?'var(--accent2)':'var(--text2)',fontSize:13,cursor:'pointer',transition:'all .2s',fontWeight:selected?600:400}}>{selected?'✓ ':''}{opt}</button>;
                  })}
                </div>
              </div>;
            }
            if(field.type==='textarea'){
              return <div key={field.key} style={{gridColumn:'1/3'}}>
                <label style={parseStyle(css.label)}>{field.label} {field.required&&<span style={{color:'var(--red)'}}>*</span>}{!field.required&&<span style={{color:'var(--text3)',fontSize:11}}>选填</span>}</label>
                <textarea style={{...parseStyle(css.input),height:100,resize:'vertical'}} value={val||''} onChange={e=>setFormData(p=>({...p,[field.key]:e.target.value}))} placeholder={`请输入${field.label}`}/>
              </div>;
            }
            return <div key={field.key}>
              <label style={parseStyle(css.label)}>{field.label} {field.required&&<span style={{color:'var(--red)'}}>*</span>}{!field.required&&<span style={{color:'var(--text3)',fontSize:11}}>选填</span>}</label>
              <input style={parseStyle(css.input)} value={val||''} onChange={e=>setFormData(p=>({...p,[field.key]:e.target.value}))} placeholder={`请输入${field.label}`}/>
            </div>;
          })}
        </div>

        <div style={{marginTop:24,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:12,color:'var(--text3)'}}>
            {(asn.formFields||[]).filter(f=>f.required).length} 个必填项 · {(asn.formFields||[]).filter(f=>!f.required).length} 个选填项
          </div>
          <div style={{display:'flex',gap:8}}>
            <Btn variant="ghost" onClick={()=>{setActiveAssignment(null);setFormData({});setAudioUploaded(false)}}>取消</Btn>
            <Btn variant="success" disabled={!audioUploaded} onClick={()=>{
              const missing=(asn.formFields||[]).filter(f=>f.required&&(!formData[f.key]||(Array.isArray(formData[f.key])&&formData[f.key].length===0)));
              if(missing.length>0){showToast('❌ 请填写必填项：'+missing.map(f=>f.label).join('、'));return;}
              if(!audioUploaded){showToast('❌ 请先上传音频文件');return;}
              const now=new Date().toLocaleString('zh-CN',{hour12:false}).replace(/\//g,'-').slice(0,16);
              const newSubId=Date.now();
              const nextSongId=Math.max(...songs.map(s=>s.id))+1;
              const nextCode=`AIMU-2026-${String(nextSongId).padStart(6,'0')}`;
              // 写入新提交记录
              const newSub={id:newSubId,assignmentId:activeAssignment,userId:currentUser.id,data:{...formData},audioUrl:'new.wav',status:'pending_review',score:null,submittedAt:now};
              setAssignmentSubs(prev=>[...prev,newSub]);
              // 同步新增歌曲入库
              const newSong={id:nextSongId,userId:currentUser.id,title:formData.songTitle||'未命名作品',lyricist:formData.lyricist||currentUser.realName,composer:formData.composer||currentUser.realName,aiTool:(formData.aiTool||[]).join('+'),prompt:formData.styleDesc||'',genre:'Pop',bpm:120,status:'pending_review',score:null,copyrightCode:nextCode,isrc:null,likeCount:0,createdAt:now,cover:'🎵',source:'assignment',assignmentId:activeAssignment};
              setSongs(prev=>[...prev,newSong]);
              showToast(`🎉 作业提交成功！版权编号 ${nextCode}，已进入评审队列`);
              setActiveAssignment(null);setFormData({});setAudioUploaded(false);
            }}>✅ 提交作业</Btn>
          </div>
        </div>
      </div>
    </PageLayout>;
  }

  // 作业列表
  const ASN_STATUS={active:{l:'进行中',c:'var(--green2)',bg:'rgba(85,239,196,.12)'},closed:{l:'已截止',c:'var(--text3)',bg:'rgba(107,114,128,.12)'},draft:{l:'草稿',c:'var(--orange)',bg:'rgba(253,203,110,.12)'}};
  return <PageLayout title="作业提交" subtitle={`${myGroups.map(g=>g.name).join(' · ')} — 共 ${myAssignments.length} 个作业`}>
    {myGroups.map(grp=>{
      const grpAssignments=myAssignments.filter(a=>a.groupId===grp.id);
      if(grpAssignments.length===0)return null;
      return <div key={grp.id} style={{marginBottom:24}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <span style={{fontSize:16}}>🏘️</span>
          <span style={{fontSize:15,fontWeight:600}}>{grp.name}</span>
          <span style={{fontSize:12,color:'var(--text3)'}}>({grpAssignments.length}个作业)</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
          {grpAssignments.map(asn=>{
            const mySub=mySubmissions.find(s=>s.assignmentId===asn.id);
            const st=ASN_STATUS[asn.status]||ASN_STATUS.active;
            const isOverdue=new Date(asn.deadline)<new Date()&&!mySub;
            return <div key={asn.id} style={{...parseStyle(css.card),cursor:'pointer',transition:'all .25s',position:'relative'}} onMouseOver={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.transform='translateY(-2px)'}} onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.transform=''}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <span style={parseStyle(css.badge(st.c,st.bg))}>{st.l}</span>
                {mySub&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:'rgba(85,239,196,.12)',color:'var(--green2)',fontWeight:500}}>✅ 已提交</span>}
                {isOverdue&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:'rgba(255,107,107,.12)',color:'var(--red)',fontWeight:500}}>⚠️ 已截止</span>}
              </div>
              <div style={{fontSize:16,fontWeight:600,marginBottom:6}}>{asn.title}</div>
              <div style={{fontSize:12,color:'var(--text3)',marginBottom:12,lineHeight:1.6}}>{asn.description}</div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12,color:'var(--text3)',paddingTop:10,borderTop:'1px solid var(--border)'}}>
                <span>📅 截止：{asn.deadline}</span>
                <span>📊 {asn.submissionCount}/{asn.totalMembers}人已提交</span>
              </div>
              <div style={{marginTop:12}}>
                {mySub?<Btn variant="ghost" style="width:100%;justify-content:center;font-size:13px;" onClick={()=>setSubmittedView(mySub.id)}>查看提交详情 →</Btn>
                :<Btn style="width:100%;justify-content:center;font-size:13px;" onClick={()=>{setActiveAssignment(asn.id);setFormData({});setAudioUploaded(false)}} disabled={asn.status!=='active'}>📝 提交作业 →</Btn>}
              </div>
            </div>;
          })}
        </div>
      </div>;
    })}
    {myAssignments.length===0&&<Empty text="暂无作业，请等待管理员发布"/>}
  </PageLayout>;
}

// ═══════════════════════════════════════════
// ★ 管理端 — 作业管理
// ═══════════════════════════════════════════


function App(){
  const [role,setRole]=useState(null);
  const [page,setPage]=useState('home');
  const [toast,setToast]=useState('');
  const [reviewSong,setReviewSong]=useState(null);
  const [songs,setSongs]=useState(()=>MOCK.songs.map(s=>({...s})));
  const [assignmentSubs,setAssignmentSubs]=useState(()=>MOCK.assignmentSubmissions.map(s=>({...s})));
  const showToast=useCallback((msg)=>{setToast(msg);setTimeout(()=>setToast(''),3000);},[]);
  const nav=useCallback((p)=>{setPage(p);window.scrollTo(0,0);},[]);
  useEffect(()=>{ if(role==='student')setPage('home'); },[role]);
  const ctx=useMemo(()=>({nav,showToast,reviewSong,setReviewSong,songs,setSongs,assignmentSubs,setAssignmentSubs}),[nav,showToast,reviewSong,songs,assignmentSubs]);
  if(!role)return <LoginPage onLogin={r=>setRole(r)}/>;
  const menus=[
    {key:'d1',label:'主要功能',divider:true},
    {key:'home',label:'首页',icon:'🏠'},
    {key:'assignments',label:'作业提交',icon:'📝',badge:(()=>{const myPending=MOCK.assignments.filter(a=>a.status==='active'&&MOCK.students[0].groupIds.includes(a.groupId));const mySubIds=assignmentSubs.filter(s=>s.userId===1).map(s=>s.assignmentId);return myPending.filter(a=>!mySubIds.includes(a.id)).length;})()},
    {key:'courses',label:'课程中心',icon:'📚'},
    {key:'upload',label:'自由上传',icon:'⬆️'},
    {key:'songs',label:'我的作品库',icon:'🎵'},
    {key:'revenue',label:'我的收益',icon:'💰'},
    {key:'d2',label:'发现',divider:true},
    {key:'community',label:'作品广场',icon:'🌐'},
    {key:'learning',label:'我的学习',icon:'📈'},
    {key:'d3',label:'个人',divider:true},
    {key:'profile',label:'个人中心',icon:'👤'},
    {key:'notifications',label:'消息中心',icon:'🔔',badge:MOCK.notifications.filter(n=>!n.read).length},
  ];
  const pages={home:<StudentHome/>,courses:<StudentCourses/>,upload:<StudentUpload/>,songs:<StudentSongs/>,revenue:<StudentRevenue/>,community:<StudentCommunity/>,learning:<StudentLearning/>,profile:<StudentProfile/>,notifications:<StudentNotifications/>,assignments:<CreatorAssignments/>};
  return <AppContext.Provider value={ctx}>
    <Sidebar items={menus} active={page} onNav={nav} role="student" onLogout={()=>{setRole(null);setPage('home');}}/>
    {pages[page]||<PageLayout title="页面不存在"><Empty text="请从侧边栏选择功能"/></PageLayout>}
    <Toast message={toast}/>
  </AppContext.Provider>;
}
ReactDOM.render(<App/>,document.getElementById('root'));

</script>
</body>
</html>
