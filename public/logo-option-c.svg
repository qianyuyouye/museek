<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <!-- Option C: Vinyl Record + Play Triangle -->
  <defs>
    <linearGradient id="gradC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b8ef0"/>
      <stop offset="100%" style="stop-color:#7c5cfc"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <g transform="translate(10, 10)">
    <!-- Vinyl disc -->
    <circle cx="40" cy="40" r="36" fill="none" stroke="#22223a" stroke-width="2"/>
    <circle cx="40" cy="40" r="36" fill="none" stroke="url(#gradC)" stroke-width="1.5" opacity="0.6"/>
    <!-- Groove rings -->
    <circle cx="40" cy="40" r="28" fill="none" stroke="#2e2e48" stroke-width="0.5" opacity="0.4"/>
    <circle cx="40" cy="40" r="22" fill="none" stroke="#2e2e48" stroke-width="0.5" opacity="0.4"/>
    <circle cx="40" cy="40" r="16" fill="none" stroke="#2e2e48" stroke-width="0.5" opacity="0.4"/>
    <!-- Center label -->
    <circle cx="40" cy="40" r="10" fill="url(#gradC)" opacity="0.15"/>
    <circle cx="40" cy="40" r="10" fill="none" stroke="url(#gradC)" stroke-width="1.5"/>
    <!-- Play triangle -->
    <polygon points="37,34 47,40 37,46" fill="url(#gradC)"/>
    <!-- Small music note -->
    <circle cx="62" cy="18" r="3" fill="#00e5a0" opacity="0.8"/>
    <circle cx="52" cy="62" r="2.5" fill="#f06292" opacity="0.7"/>
  </g>
  <!-- Text -->
  <text x="95" y="58" font-family="'Inter','Noto Sans SC',sans-serif" font-size="38" font-weight="700" fill="#e8e8f0">Museek</text>
  <text x="97" y="76" font-family="'Inter','Noto Sans SC',sans-serif" font-size="11" font-weight="400" fill="#6a6a82" letter-spacing="1.5">灵感 · 创作 · 发行 · 收益</text>
</svg>
