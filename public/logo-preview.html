<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Museek Logo Preview</title>
<style>
  body { background: #0c0c14; color: #e8e8f0; font-family: sans-serif; margin: 0; padding: 40px; }
  h1 { text-align: center; margin-bottom: 40px; font-size: 20px; color: #888; }
  .container { display: flex; justify-content: center; gap: 60px; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
  .logo-card { background: #141422; border: 1px solid #2a2a40; border-radius: 12px; padding: 30px; text-align: center; }
  .logo-card img { max-width: 400px; height: auto; }
  .logo-card h2 { margin-top: 20px; font-size: 16px; color: #9b8ef0; }
  .logo-card p { font-size: 13px; color: #6a6a82; margin-top: 4px; }
</style>
</head>
<body>
<h1>Museek Logo Options</h1>
<div class="container">
  <div class="logo-card">
    <img src="logo-option-a.svg" alt="Option A">
    <h2>Option A</h2>
    <p>音符 + 神经网络</p>
  </div>
  <div class="logo-card">
    <img src="logo-option-b.svg" alt="Option B">
    <h2>Option B</h2>
    <p>声波波形 + M 字母</p>
  </div>
  <div class="logo-card">
    <img src="logo-option-c.svg" alt="Option C">
    <h2>Option C</h2>
    <p>黑胶唱片 + 播放三角</p>
  </div>
</div>
</body>
</html>
