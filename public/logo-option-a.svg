<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <!-- Option A: Musical Note + Neural Node -->
  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b8ef0"/>
      <stop offset="100%" style="stop-color:#7c5cfc"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <g transform="translate(10, 10)">
    <!-- Outer circle -->
    <circle cx="40" cy="40" r="38" fill="none" stroke="url(#gradA)" stroke-width="2.5"/>
    <!-- Musical note stem -->
    <line x1="48" y1="20" x2="48" y2="52" stroke="url(#gradA)" stroke-width="3" stroke-linecap="round"/>
    <!-- Musical note head -->
    <ellipse cx="38" cy="54" rx="12" ry="8" fill="url(#gradA)"/>
    <!-- Neural dot -->
    <circle cx="48" cy="20" r="4" fill="#9b8ef0"/>
    <!-- Orbiting dot -->
    <circle cx="22" cy="28" r="3" fill="#7c5cfc" opacity="0.7"/>
    <circle cx="58" cy="32" r="2" fill="#00e5a0" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="90" y="58" font-family="'Inter','Noto Sans SC',sans-serif" font-size="38" font-weight="700" fill="#e8e8f0">Museek</text>
  <text x="92" y="76" font-family="'Inter','Noto Sans SC',sans-serif" font-size="11" font-weight="400" fill="#6a6a82" letter-spacing="2">AI MUSIC PLATFORM</text>
</svg>
