services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-museek2026}@db:3306/museek
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - AI_API_BASE_URL=${AI_API_BASE_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - OSS_BUCKET=${OSS_BUCKET:-}
      - OSS_REGION=${OSS_REGION:-}
      - OSS_DOMAIN=${OSS_DOMAIN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # 首次初始化：建表 + 种子数据（用 builder 阶段镜像，含完整 node_modules）
  init:
    build:
      context: .
      target: builder
    environment:
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-museek2026}@db:3306/museek
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "-c", "npx prisma db push --skip-generate && node prisma/seed.js"]
    restart: "no"
    profiles: ["init"]

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-museek2026}
      - MYSQL_DATABASE=museek
    # 生产环境不暴露端口，只在内部网络访问
    # 开发调试时取消注释：
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
